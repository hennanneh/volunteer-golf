    function renderReportFilters(isCaptainView, captainHole) {
      if (currentReport === 'hat-qr-codes' || currentReport === 'vols-per-hole' || currentReport === 'assists-per-hole' || currentReport === 'outing-preferences') return ''; // No filters needed
      const showHoleFilter = !isCaptainView && ['volunteer-totals', 'hole-roster'].includes(currentReport);
      const showDayFilter = currentReport === 'hole-roster';
      const isHoleRoster = currentReport === 'hole-roster';
      const showHistoryCheckbox = isHoleRoster && !isCaptainView;
      const movedCount = appData.volunteers.filter(v => v.originalHole !== undefined).length;

      if (!showHoleFilter && !showDayFilter && !showHistoryCheckbox) return '';

      return `
        <div style="background:#f8f9fa;border-radius:8px;padding:12px 15px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center">
          ${showHoleFilter ? `
            <div style="display:flex;align-items:center;gap:8px">
              <label style="font-size:13px;color:#666">Hole:</label>
              <select onchange="reportFilters.hole=this.value;render()" style="padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px">
                ${currentReport !== 'hole-roster' ? `<option value="all" ${reportFilters.hole === 'all' ? 'selected' : ''}>All Holes</option>` : ''}
                ${[...Array(getNumberOfHoles()).keys()].map(i => i + 1).map(h =>
                  `<option value="${h}" ${reportFilters.hole == h || (currentReport === 'hole-roster' && reportFilters.hole === 'all' && h === 1) ? 'selected' : ''}>Hole #${h}</option>`
                ).join('')}
              </select>
            </div>
          ` : ''}

          ${showDayFilter ? `
            <div style="display:flex;align-items:center;gap:8px">
              <label style="font-size:13px;color:#666">Day:</label>
              <select onchange="reportFilters.day=this.value;render()" style="padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px">
                <option value="all" ${reportFilters.day === 'all' ? 'selected' : ''}>All Days</option>
                ${DAYS.map(d => `<option value="${d}" ${reportFilters.day === d ? 'selected' : ''}>${d}</option>`).join('')}
              </select>
            </div>
          ` : ''}

          ${showHistoryCheckbox ? `
            <div style="border-left:1px solid #ddd;padding-left:12px;display:flex;align-items:center;gap:6px">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
                <input type="checkbox" ${showHoleHistory ? 'checked' : ''} onchange="toggleHoleHistory(this.checked)" style="width:15px;height:15px;cursor:pointer">
                Show move history
              </label>
              ${movedCount > 0 ? `<span style="background:#ff9800;color:white;padding:2px 6px;border-radius:10px;font-size:11px">${movedCount}</span>` : ''}
              ${movedCount > 0 && showHoleHistory ? `<button onclick="clearHoleHistory()" style="background:none;border:none;color:#999;font-size:11px;cursor:pointer;text-decoration:underline">Clear</button>` : ''}
            </div>
          ` : ''}

          ${isHoleRoster && !isCaptainView ? `
            <button onclick="reportFilters.hole='all-export';render()" style="margin-left:auto;padding:6px 14px;background:#1a472a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">View All Holes</button>
          ` : ''}
        </div>
      `;
    }

    function renderReportResults(isCaptainView, captainHole) {
      const holeFilter = isCaptainView ? captainHole : (reportFilters.hole === 'all' ? null : parseInt(reportFilters.hole));

      switch (currentReport) {
        case 'volunteer-totals':
          return renderVolunteerTotalsReport(holeFilter);
        case 'hole-roster':
          return renderHoleRosterReport(holeFilter || 1, { showMoveColumn: true });
        case 'service-recognition':
          return renderServiceRecognitionReport();
        case 'hat-qr-codes':
          return renderHatQRCodesReport();
        case 'vols-per-hole':
          return buildVolsPerHoleTable();
        case 'assists-per-hole':
          return buildAssistsPerHoleTable();
        case 'outing-preferences':
          return renderOutingPreferencesReport();
        case 'custom':
          return renderCustomReport();
        default:
          return '<p>Unknown report type</p>';
      }
    }

    function renderVolunteerTotalsReport(holeFilter) {
      let volunteers = [...appData.volunteers];
      if (holeFilter) volunteers = volunteers.filter(v => v.hole === holeFilter);

      const data = volunteers.map(v => {
        let scheduledCount = 0;
        let workedCount = 0;

        DAYS.forEach(day => {
          SHIFTS.forEach(shift => {
            const key = day + ' ' + shift;
            if (v.scheduled && v.scheduled[key]) {
              scheduledCount++;
              if (appData.checkIns.some(c => c.volunteerId === v.id && c.day === day && c.shift === shift)) {
                workedCount++;
              }
            }
          });
        });

        return { volunteer: v, scheduledCount, workedCount };
      });

      // Sort by worked count descending
      data.sort((a, b) => b.workedCount - a.workedCount);

      return `
        <div id="report-content">
          <table style="width:100%;border-collapse:collapse;font-size:14px">
            <thead>
              <tr style="background:#f8f9fa">
                <th style="text-align:left;padding:12px;border-bottom:2px solid #ddd">Volunteer</th>
                <th style="text-align:center;padding:12px;border-bottom:2px solid #ddd">Hole</th>
                <th style="text-align:center;padding:12px;border-bottom:2px solid #ddd">Shifts Scheduled</th>
                <th style="text-align:center;padding:12px;border-bottom:2px solid #ddd">Shifts Worked</th>
                <th style="text-align:center;padding:12px;border-bottom:2px solid #ddd">Attendance</th>
              </tr>
            </thead>
            <tbody>
              ${data.map(r => `
                <tr>
                  <td style="padding:10px 12px;border-bottom:1px solid #eee">${r.volunteer.name}</td>
                  <td style="text-align:center;padding:10px 12px;border-bottom:1px solid #eee">#${r.volunteer.hole}</td>
                  <td style="text-align:center;padding:10px 12px;border-bottom:1px solid #eee">${r.scheduledCount}</td>
                  <td style="text-align:center;padding:10px 12px;border-bottom:1px solid #eee">${r.workedCount}</td>
                  <td style="text-align:center;padding:10px 12px;border-bottom:1px solid #eee">${r.scheduledCount > 0 ? Math.round(r.workedCount / r.scheduledCount * 100) : 0}%</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function sortServiceRecognition(col) {
      if (serviceRecognitionSort.col === col) {
        serviceRecognitionSort.dir = serviceRecognitionSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        serviceRecognitionSort.col = col;
        serviceRecognitionSort.dir = col === 'name' ? 'asc' : 'desc';
      }
      render();
    }

    function renderServiceRecognitionReport() {
      // Filter volunteers with years of service that are multiples of 5
      let eligibleVolunteers = appData.volunteers
        .filter(v => v.yearsWorked && v.yearsWorked >= 5 && v.yearsWorked % 5 === 0);

      // Apply sorting
      const { col, dir } = serviceRecognitionSort;
      const mult = dir === 'asc' ? 1 : -1;
      eligibleVolunteers.sort((a, b) => {
        if (col === 'name') return a.name.localeCompare(b.name) * mult;
        if (col === 'hole') return (a.hole - b.hole) * mult;
        if (col === 'years') return (a.yearsWorked - b.yearsWorked) * mult;
        return 0;
      });

      if (eligibleVolunteers.length === 0) {
        return `
          <div id="report-content" style="text-align:center;padding:40px;color:#666">
            <p style="font-size:16px;margin-bottom:10px">No volunteers eligible for service recognition</p>
            <p style="font-size:13px">Volunteers with 5, 10, 15, 20+ years of service will appear here</p>
          </div>
        `;
      }

      // Group by milestone
      const milestones = {};
      eligibleVolunteers.forEach(v => {
        if (!milestones[v.yearsWorked]) milestones[v.yearsWorked] = [];
        milestones[v.yearsWorked].push(v);
      });

      const sortArrow = (c) => serviceRecognitionSort.col === c ? (serviceRecognitionSort.dir === 'asc' ? ' ▲' : ' ▼') : '';
      const thStyle = 'padding:12px;border-bottom:2px solid #ddd;cursor:pointer;user-select:none';

      return `
        <div id="report-content">
          <p style="color:#666;font-size:13px;margin-bottom:20px">${eligibleVolunteers.length} volunteer${eligibleVolunteers.length !== 1 ? 's' : ''} eligible for service recognition awards</p>
          <table style="width:100%;border-collapse:collapse;font-size:14px">
            <thead>
              <tr style="background:#f8f9fa">
                <th style="text-align:left;${thStyle}" onclick="sortServiceRecognition('name')">Name${sortArrow('name')}</th>
                <th style="text-align:center;${thStyle}" onclick="sortServiceRecognition('hole')">Hole${sortArrow('hole')}</th>
                <th style="text-align:center;${thStyle}" onclick="sortServiceRecognition('years')">Years of Service${sortArrow('years')}</th>
              </tr>
            </thead>
            <tbody>
              ${eligibleVolunteers.map(v => `
                <tr>
                  <td style="padding:10px 12px;border-bottom:1px solid #eee">${v.name}</td>
                  <td style="text-align:center;padding:10px 12px;border-bottom:1px solid #eee">#${v.hole}</td>
                  <td style="text-align:center;padding:10px 12px;border-bottom:1px solid #eee">
                    <span style="background:${v.yearsWorked >= 20 ? '#ffd700' : v.yearsWorked >= 15 ? '#c0c0c0' : v.yearsWorked >= 10 ? '#cd7f32' : '#1a472a'};color:${v.yearsWorked >= 20 ? '#333' : v.yearsWorked >= 15 ? '#333' : '#fff'};padding:4px 10px;border-radius:12px;font-weight:600">${v.yearsWorked} years</span>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>

          <div style="margin-top:30px;padding:20px;background:#f8f9fa;border-radius:8px">
            <h4 style="margin:0 0 15px 0;font-size:14px;color:#333">Summary by Milestone</h4>
            <div style="display:flex;flex-wrap:wrap;gap:15px">
              ${Object.keys(milestones).sort((a, b) => b - a).map(years => `
                <div style="background:#fff;padding:12px 20px;border-radius:8px;border:1px solid #ddd;text-align:center">
                  <div style="font-size:24px;font-weight:700;color:#1a472a">${milestones[years].length}</div>
                  <div style="font-size:12px;color:#666">${years} years</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function moveVolunteerToHole(volunteerId, newHole) {
      const vol = appData.volunteers.find(v => v.id === volunteerId);
      if (vol && newHole !== vol.hole) {
        const oldHole = vol.hole;
        // Track original hole if not already set
        if (vol.originalHole === undefined) {
          vol.originalHole = oldHole;
        }
        // If moving back to original hole, clear the tracking
        if (newHole === vol.originalHole) {
          delete vol.originalHole;
        }
        vol.hole = newHole;
        saveData();
        logActivity('edit', vol.name, `Moved from Hole #${oldHole} to Hole #${newHole}`);
        render();
      }
    }

    function renderHoleRosterReport(holeNum, options = {}) {
      const { hideViewAll = false, hideTitle = false, showMoveColumn = false } = options;
      const dayFilter = reportFilters.day;
      const showAllHoles = reportFilters.hole === 'all-export' && !hideViewAll;
      const hole = showAllHoles ? null : (parseInt(reportFilters.hole) || holeNum || 1);
      const days = dayFilter === 'all' ? DAYS : [dayFilter];
      const numHoles = getNumberOfHoles();

      // Helper to render a single hole's roster
      function renderSingleHoleRoster(holeNumber) {
        // Current volunteers on this hole
        const currentVolunteers = appData.volunteers.filter(v => v.hole === holeNumber);

        // Volunteers who were moved away from this hole (show if history enabled)
        const movedAwayVolunteers = showHoleHistory ?
          appData.volunteers.filter(v => v.originalHole === holeNumber && v.hole !== holeNumber) : [];

        // Combine lists for display
        const allVolunteers = [...currentVolunteers, ...movedAwayVolunteers];

        // Sort: captains first, then alphabetically
        allVolunteers.sort((a, b) => {
          const aIsCaptain = ['Captain', 'Asst. Chairman', 'Chairman'].includes(a.type);
          const bIsCaptain = ['Captain', 'Asst. Chairman', 'Chairman'].includes(b.type);
          if (aIsCaptain && !bIsCaptain) return -1;
          if (!aIsCaptain && bIsCaptain) return 1;
          return a.name.localeCompare(b.name);
        });

        // Calculate totals per shift (only current volunteers)
        const shiftTotals = {};
        days.forEach(day => {
          SHIFTS.forEach(shift => {
            const key = day + ' ' + shift;
            shiftTotals[key] = currentVolunteers.filter(v => v.scheduled && v.scheduled[key]).length;
          });
        });

        if (allVolunteers.length === 0) {
          return `<div style="margin-bottom:30px"><h4 style="margin:0 0 10px 0;color:#1a472a">Hole #${holeNumber}</h4><p style="color:#666">No volunteers assigned.</p></div>`;
        }

        return `
          <div class="hole-roster" style="margin-bottom:30px;">
            ${hideTitle ? '' : `<h4 style="margin:0 0 15px 0;color:#1a472a">Hole #${holeNumber} - Full Roster</h4>`}
            <table style="width:100%;border-collapse:collapse;font-size:14px;border:1px solid #ccc">
              <thead>
                <tr style="background:#f8f9fa">
                  <th style="text-align:left;padding:12px;border:1px solid #ccc">Volunteer</th>
                  <th style="text-align:center;padding:12px;border:1px solid #ccc">Years</th>
                  ${showMoveColumn ? `<th style="text-align:center;padding:12px;border:1px solid #ccc">Move</th>` : ''}
                  ${days.map(d => `
                    <th style="text-align:center;padding:12px;border:1px solid #ccc" colspan="2">${d.slice(0, 3)}</th>
                  `).join('')}
                  <th style="text-align:center;padding:12px;border:1px solid #ccc;color:#4caf50;font-weight:600;font-size:16px" title="Checked In">✓</th>
                  <th style="text-align:center;padding:12px;border:1px solid #ccc;color:#1a472a;font-weight:600;font-size:16px" title="Total Scheduled">○</th>
                </tr>
                <tr style="background:#f8f9fa">
                  <th style="border:1px solid #ccc"></th>
                  <th style="border:1px solid #ccc"></th>
                  ${showMoveColumn ? `<th style="border:1px solid #ccc"></th>` : ''}
                  ${days.map(() => `
                    <th style="text-align:center;padding:6px;border:1px solid #ccc;font-size:11px;font-weight:normal;color:#666">AM</th>
                    <th style="text-align:center;padding:6px;border:1px solid #ccc;font-size:11px;font-weight:normal;color:#666">PM</th>
                  `).join('')}
                  <th style="border:1px solid #ccc"></th>
                  <th style="border:1px solid #ccc"></th>
                </tr>
              </thead>
              <tbody>
                <tr style="background:#f0f7f0;font-weight:600">
                  <td style="padding:10px 12px;border:1px solid #ccc" colspan="${showMoveColumn ? 3 : 2}">Total Scheduled</td>
                  ${days.map(day =>
                    SHIFTS.map(shift => {
                      const key = day + ' ' + shift;
                      return `<td style="text-align:center;padding:10px 6px;border:1px solid #ccc;color:#1a472a">${shiftTotals[key]}</td>`;
                    }).join('')
                  ).join('')}
                  <td style="border:1px solid #ccc"></td>
                  <td style="border:1px solid #ccc"></td>
                </tr>
                ${allVolunteers.map(v => {
                  const isMovedAway = v.originalHole === holeNumber && v.hole !== holeNumber;
                  const isNewHere = v.originalHole !== undefined && v.originalHole !== holeNumber && v.hole === holeNumber;
                  const rowStyle = isMovedAway ? 'opacity:0.5;background:#f5f5f5;' : '';

                  const isCaptainRole = ['Captain', 'Asst. Chairman', 'Chairman'].includes(v.type);
                  const emailAttr = (v.email || '').replace(/"/g, '&quot;');
                  const phoneAttr = (v.phone || '').replace(/"/g, '&quot;');
                  return `
                  <tr style="${rowStyle}" data-vol-email="${emailAttr}" data-vol-phone="${phoneAttr}">
                    <td style="padding:10px 12px;border:1px solid #ccc">
                      ${isNewHere && showHoleHistory ? '<span style="background:#4caf50;color:white;padding:2px 6px;border-radius:4px;font-size:10px;margin-right:6px">NEW</span>' : ''}
                      ${v.name}${isCaptainRole ? '<span title="' + v.type + '" style="color:#1a472a;font-weight:700;margin-left:4px">*</span>' : ''}
                      ${isMovedAway ? '<span style="color:#999;font-size:11px;margin-left:6px">(moved)</span>' : ''}
                    </td>
                    <td style="padding:10px 12px;border:1px solid #ccc;text-align:center;font-size:13px;color:#333">${v.yearsWorked != null ? v.yearsWorked : '-'}</td>
                    ${showMoveColumn ? `
                      <td style="padding:6px;border:1px solid #ccc;text-align:center">
                        <select onchange="moveVolunteerToHole('${v.id}', parseInt(this.value))" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px;cursor:pointer;${isMovedAway ? 'background:#fff3cd;' : ''}">
                          ${[...Array(numHoles).keys()].map(i => i + 1).map(h =>
                            `<option value="${h}" ${h === v.hole ? 'selected' : ''}>#${h}</option>`
                          ).join('')}
                        </select>
                      </td>
                    ` : ''}
                    ${days.map(day =>
                      SHIFTS.map(shift => {
                        const key = day + ' ' + shift;
                        const isScheduled = v.scheduled && v.scheduled[key];
                        const isCheckedIn = appData.checkIns.some(c => c.volunteerId === v.id && c.day === day && c.shift === shift);
                        let icon = '';
                        let color = isMovedAway ? '#ccc' : '#ccc';
                        if (isScheduled && isCheckedIn) { icon = '✓'; color = isMovedAway ? '#ccc' : '#4caf50'; }
                        else if (isScheduled) { icon = '○'; color = isMovedAway ? '#ccc' : '#1a472a'; }
                        return `<td style="text-align:center;padding:10px 6px;border:1px solid #ccc;color:${color};font-weight:600">${icon}</td>`;
                      }).join('')
                    ).join('')}
                    ${(() => {
                      let checkedInCount = 0;
                      let scheduledCount = 0;
                      days.forEach(day => {
                        SHIFTS.forEach(shift => {
                          const key = day + ' ' + shift;
                          if (v.scheduled && v.scheduled[key]) {
                            scheduledCount++;
                            if (appData.checkIns.some(c => c.volunteerId === v.id && c.day === day && c.shift === shift)) {
                              checkedInCount++;
                            }
                          }
                        });
                      });
                      const ciColor = isMovedAway ? '#ccc' : '#4caf50';
                      const scColor = isMovedAway ? '#ccc' : '#1a472a';
                      return `<td style="text-align:center;padding:10px 6px;border:1px solid #ccc;color:${ciColor};font-weight:600">${checkedInCount}</td>
                              <td style="text-align:center;padding:10px 6px;border:1px solid #ccc;color:${scColor};font-weight:600">${scheduledCount}</td>`;
                    })()}
                  </tr>
                `}).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      const historyLegend = showHoleHistory ? `
        &nbsp;&nbsp;
        <span style="background:#4caf50;color:white;padding:1px 5px;border-radius:3px;font-size:10px">NEW</span> = moved here &nbsp;&nbsp;
        <span style="opacity:0.5">Grayed</span> = moved away
      ` : '';

      if (showAllHoles) {
        // Render all holes
        const allHoles = [...Array(getNumberOfHoles()).keys()].map(i => i + 1);
        return `
          <div id="report-content">
            <div style="margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap">
              <button onclick="reportFilters.hole='all';render()" style="background:none;border:none;color:#1a472a;cursor:pointer;font-size:13px;padding:0">&larr; Back to single hole view</button>
            </div>
            ${allHoles.map(h => renderSingleHoleRoster(h)).join('')}
            <div style="margin-top:15px;font-size:12px;color:#666">
              <span style="color:#1a472a;font-weight:700">*</span> = Captain / Chairman &nbsp;&nbsp;
              <span style="color:#4caf50;font-weight:600">✓</span> = Checked in &nbsp;&nbsp;
              <span style="color:#1a472a;font-weight:600">○</span> = Scheduled
              ${historyLegend}
            </div>
          </div>
        `;
      }

      return `
        <div id="report-content">
          ${renderSingleHoleRoster(hole)}

          <div style="font-size:12px;color:#666">
            <span style="color:#1a472a;font-weight:700">*</span> = Captain / Chairman &nbsp;&nbsp;
            <span style="color:#4caf50;font-weight:600">✓</span> = Checked in &nbsp;&nbsp;
            <span style="color:#1a472a;font-weight:600">○</span> = Scheduled
            ${historyLegend}
          </div>
        </div>
      `;
    }

    let hatQRFilter = { hat: 'all', received: 'pending' };
    let outingReportSort = 'name'; // 'name' or 'hole'
    let outingReportStatus = 'all'; // 'all', 'has-preferences', 'no-preference', 'not-responded', 'not-attending'

    function renderHatQRCodesReport() {
      // Filter volunteers
      let volunteers = appData.volunteers
        .filter(v => v.hat && v.hat.trim() !== '')
        .sort((a, b) => a.name.localeCompare(b.name));

      if (hatQRFilter.hat !== 'all') {
        volunteers = volunteers.filter(v => v.hat === hatQRFilter.hat);
      }
      if (hatQRFilter.received === 'pending') {
        volunteers = volunteers.filter(v => !v.hatReceived);
      } else if (hatQRFilter.received === 'received') {
        volunteers = volunteers.filter(v => v.hatReceived);
      }

      const hatTypes = ['Cap', 'Ladies Visor', 'S/M Sun Hat', 'L/XL Sun Hat'];

      return `
        <div id="hatQRReport">
          <div style="background:#f8f9fa;border-radius:8px;padding:15px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:15px;align-items:center">
            <span style="font-size:13px;color:#666;font-weight:600">Filters:</span>
            <div>
              <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Hat Type</label>
              <select onchange="hatQRFilter.hat=this.value;render()" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px">
                <option value="all" ${hatQRFilter.hat === 'all' ? 'selected' : ''}>All Types</option>
                ${hatTypes.map(h => `<option value="${h}" ${hatQRFilter.hat === h ? 'selected' : ''}>${h}</option>`).join('')}
              </select>
            </div>
            <div>
              <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Status</label>
              <select onchange="hatQRFilter.received=this.value;render()" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px">
                <option value="pending" ${hatQRFilter.received === 'pending' ? 'selected' : ''}>Not Received</option>
                <option value="received" ${hatQRFilter.received === 'received' ? 'selected' : ''}>Received</option>
                <option value="all" ${hatQRFilter.received === 'all' ? 'selected' : ''}>All</option>
              </select>
            </div>
            <div style="margin-left:auto">
              <button onclick="generateAllQRCodes()" style="padding:10px 20px;background:#1a472a;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500">
                Generate ${volunteers.length} QR Codes for Printing
              </button>
            </div>
          </div>

          <p style="color:#666;font-size:13px;margin-bottom:15px">
            Showing <strong>${volunteers.length}</strong> volunteer(s) with hats assigned.
            Click "Generate QR Codes for Printing" to open a printable page with all QR codes.
          </p>

          <div style="max-height:400px;overflow-y:auto;border:1px solid #eee;border-radius:8px">

    function getOutingStatus(v) {
      const hasPicks = v.pairingPreferences && v.pairingPreferences.some(p => p);
      if (v.notAttendingOuting) return 'not-attending';
      if (hasPicks) return 'has-preferences';
      if (v.noOutingPreference) return 'no-preference';
      return 'not-responded';
    }

    function renderOutingPreferencesReport() {
      const allVolunteers = [...appData.volunteers];

      const notAttending = allVolunteers.filter(v => getOutingStatus(v) === 'not-attending');
      const withPreferences = allVolunteers.filter(v => getOutingStatus(v) === 'has-preferences');
      const noPreference = allVolunteers.filter(v => getOutingStatus(v) === 'no-preference');
      const notResponded = allVolunteers.filter(v => getOutingStatus(v) === 'not-responded');

      // Filter by status
      let volunteers = outingReportStatus === 'all' ? allVolunteers :
        allVolunteers.filter(v => getOutingStatus(v) === outingReportStatus);

        volunteers.sort((a, b) => (a.hole || 999) - (b.hole || 999) || a.name.localeCompare(b.name));

        volunteers.sort((a, b) => a.name.localeCompare(b.name));

      const getVolName = (id) => {
        const v = appData.volunteers.find(v => v.id === id);

              <div style="font-size:24px;font-weight:700;color:${outingReportStatus === 'not-responded' ? 'white' : '#856404'}">${notResponded.length}</div>

    function renderCustomReport() {
      const availableColumns = [
        { id: 'name', label: 'Name' },
        { id: 'hole', label: 'Hole' },
        { id: 'type', label: 'Type' },
        { id: 'email', label: 'Email' },
        { id: 'phone', label: 'Phone' },
        { id: 'yearsWorked', label: 'Years' },
        { id: 'hat', label: 'Hat' },
        { id: 'hatReceived', label: 'Hat Received' },
        { id: 'totalScheduled', label: 'Shifts Scheduled' },
        { id: 'totalWorked', label: 'Shifts Worked' },
        { id: 'attendance', label: 'Attendance %' }
      ];

      // Add individual day columns
      DAYS.forEach(day => {
        availableColumns.push({ id: 'sched_' + day, label: day + ' Schedule' });
      });

      const volunteerTypes = [...new Set(appData.volunteers.map(v => v.type).filter(t => t))].sort();

      // Apply filters
      let filtered = [...appData.volunteers];

      if (customReportConfig.filters.hole !== 'all') {
        filtered = filtered.filter(v => v.hole === parseInt(customReportConfig.filters.hole));
      }
      if (customReportConfig.filters.type !== 'all') {
        filtered = filtered.filter(v => v.type === customReportConfig.filters.type);
      }
      if (customReportConfig.filters.dayScheduled !== 'all') {
        const day = customReportConfig.filters.dayScheduled;
        filtered = filtered.filter(v => v.scheduled && (v.scheduled[day + ' AM'] || v.scheduled[day + ' PM']));
      }

      // Calculate derived fields
      const data = filtered.map(v => {
        let totalScheduled = 0;
        let totalWorked = 0;
        const schedByDay = {};

        DAYS.forEach(day => {
          let daySchedule = [];
          SHIFTS.forEach(shift => {
            const key = day + ' ' + shift;
            if (v.scheduled && v.scheduled[key]) {
              totalScheduled++;
              daySchedule.push(shift);
              if (appData.checkIns.some(c => c.volunteerId === v.id && c.day === day && c.shift === shift)) {
                totalWorked++;
              }
            }
          });
          schedByDay['sched_' + day] = daySchedule.length > 0 ? daySchedule.join('/') : '-';
        });

        return {
          ...v,
          totalScheduled,
          totalWorked,
          attendance: totalScheduled > 0 ? Math.round(totalWorked / totalScheduled * 100) + '%' : '-',
          ...schedByDay
        };
      });

      // Sort
      const sortKey = customReportConfig.sortBy;
      const sortDir = customReportConfig.sortDir === 'asc' ? 1 : -1;
      data.sort((a, b) => {
        let aVal = a[sortKey] ?? '';
        let bVal = b[sortKey] ?? '';
        if (typeof aVal === 'number' && typeof bVal === 'number') {
          return (aVal - bVal) * sortDir;
        }
        return String(aVal).localeCompare(String(bVal)) * sortDir;
      });

      return `
        <div id="report-content">
          <div style="background:#f8f9fa;border-radius:8px;padding:15px;margin-bottom:20px">
            <div style="margin-bottom:15px">
              <label style="font-size:12px;color:#666;display:block;margin-bottom:8px;font-weight:600">Columns to Display</label>
              <div style="display:flex;flex-wrap:wrap;gap:8px">
                ${availableColumns.map(col => `
                  <label style="display:flex;align-items:center;gap:4px;font-size:12px;background:${customReportConfig.columns.includes(col.id) ? '#e8f5e9' : '#fff'};border:1px solid ${customReportConfig.columns.includes(col.id) ? '#4caf50' : '#ddd'};padding:6px 10px;border-radius:4px;cursor:pointer">
                    <input type="checkbox" ${customReportConfig.columns.includes(col.id) ? 'checked' : ''} onchange="toggleCustomColumn('${col.id}')" style="margin:0">
                    ${col.label}
                  </label>
                `).join('')}
              </div>
            </div>

            <div style="display:flex;flex-wrap:wrap;gap:15px;margin-bottom:15px">
              <div>
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Filter by Hole</label>
                <select onchange="customReportConfig.filters.hole=this.value;render()" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px">
                  <option value="all">All Holes</option>
                  ${[...Array(getNumberOfHoles()).keys()].map(i => i + 1).map(h =>
                    `<option value="${h}" ${customReportConfig.filters.hole == h ? 'selected' : ''}>Hole #${h}</option>`
                  ).join('')}
                </select>
              </div>
              <div>
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Filter by Type</label>
                <select onchange="customReportConfig.filters.type=this.value;render()" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px">
                  <option value="all">All Types</option>
                  ${volunteerTypes.map(t => `<option value="${t}" ${customReportConfig.filters.type === t ? 'selected' : ''}>${t}</option>`).join('')}
                </select>
              </div>
              <div>
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Scheduled on Day</label>
                <select onchange="customReportConfig.filters.dayScheduled=this.value;render()" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px">
                  <option value="all">Any Day</option>
                  ${DAYS.map(d => `<option value="${d}" ${customReportConfig.filters.dayScheduled === d ? 'selected' : ''}>${d}</option>`).join('')}
                </select>
              </div>
            </div>

            <div style="display:flex;flex-wrap:wrap;gap:15px">
              <div>
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Sort By</label>
                <select onchange="customReportConfig.sortBy=this.value;render()" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px">
                  ${availableColumns.filter(c => customReportConfig.columns.includes(c.id)).map(col =>
                    `<option value="${col.id}" ${customReportConfig.sortBy === col.id ? 'selected' : ''}>${col.label}</option>`
                  ).join('')}
                </select>
              </div>
              <div>
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Direction</label>
                <select onchange="customReportConfig.sortDir=this.value;render()" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px">
                  <option value="asc" ${customReportConfig.sortDir === 'asc' ? 'selected' : ''}>A → Z / Low → High</option>
                  <option value="desc" ${customReportConfig.sortDir === 'desc' ? 'selected' : ''}>Z → A / High → Low</option>
                </select>
              </div>
            </div>
          </div>

          <p style="color:#666;font-size:13px;margin-bottom:15px">${data.length} volunteer${data.length !== 1 ? 's' : ''} found</p>

          ${data.length === 0 ? '<p style="color:#999;text-align:center;padding:40px">No volunteers match the selected filters.</p>' : `
            <table style="width:100%;border-collapse:collapse;font-size:13px">
              <thead>
                <tr style="background:#f8f9fa">
                  ${customReportConfig.columns.map(colId => {
                    const col = availableColumns.find(c => c.id === colId);
                    return `<th style="text-align:left;padding:10px 8px;border-bottom:2px solid #ddd;white-space:nowrap">${col?.label || colId}</th>`;
                  }).join('')}
                </tr>
              </thead>
              <tbody>
                ${data.map(row => `
                  <tr>
                    ${customReportConfig.columns.map(colId => {
                      let val = row[colId] ?? '-';
                      if (colId === 'hole') val = '#' + val;
                      if (colId === 'hatReceived') val = row[colId] ? 'Yes' : 'No';
                      return `<td style="padding:8px;border-bottom:1px solid #eee">${val}</td>`;
                    }).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `}
        </div>
      `;
    }

    function toggleCustomColumn(colId) {
      const idx = customReportConfig.columns.indexOf(colId);
      if (idx >= 0) {
        customReportConfig.columns.splice(idx, 1);
      } else {
        customReportConfig.columns.push(colId);

      // Reset sort if current sort column was removed
      if (!customReportConfig.columns.includes(customReportConfig.sortBy)) {
        customReportConfig.sortBy = customReportConfig.columns[0] || 'name';
      }
      render();
    }

    function exportReportCSV() {
      const content = document.getElementById('report-content');
      if (!content) return;

      const tables = content.querySelectorAll('table');
      if (!tables.length) {
        alert('No table data to export');
        return;
      }

      const isHoleRoster = currentReport === 'hole-roster';
      const quote = (s) => '"' + String(s).replace(/"/g, '""') + '"';
      // Replace status glyphs with plain text so the CSV reads cleanly in
      // Excel/Sheets regardless of the user's default encoding.
      const cleanCell = (text, isHeader) => {
        const t = text.trim();
        if (t === '✓') return isHeader ? 'Checked In' : 'Yes';
        if (t === '○') return isHeader ? 'Scheduled' : 'Sched';
        return text;
      };

      let csv = [];
      tables.forEach((table, tableIdx) => {
        const rows = table.querySelectorAll('tr');
        rows.forEach((row, rowIdx) => {
          const isHeader = row.parentElement && row.parentElement.tagName === 'THEAD';
          const cols = row.querySelectorAll('th, td');
          const rowData = [];
          cols.forEach(col => {
            rowData.push(quote(cleanCell(col.innerText, isHeader)));
          });

          if (isHoleRoster && rowData.length > 0) {
            // Insert Email + Phone as columns 2 and 3.
            // Header row 1 (first row of each table) gets labels; everything
            // else gets the volunteer's email/phone if the row is tagged,
            // otherwise empty cells (header row 2, totals row).
            let email = '';
            let phone = '';
            if (rowIdx === 0) {
              email = 'Email';
              phone = 'Phone';
            } else if (row.dataset.volEmail !== undefined || row.dataset.volPhone !== undefined) {
              email = row.dataset.volEmail || '';
              phone = row.dataset.volPhone || '';
            }
            rowData.splice(1, 0, quote(email), quote(phone));
          }

          csv.push(rowData.join(','));
        });
        if (isHoleRoster && tableIdx < tables.length - 1) csv.push('');
      });

      // Prepend UTF-8 BOM so Excel detects the encoding correctly.
      const blob = new Blob(['\uFEFF' + csv.join('\n')], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = currentReport + '-' + new Date().toISOString().split('T')[0] + '.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    function downloadPDF(holeNumber) {
      const hole = holeNumber || reportFilters.hole || 1;
      const content = document.getElementById('report-content');
      if (!content) return;

      // Extract only the table, skip buttons and legend divs
      const table = content.querySelector('table');
      if (!table) return;

      // Print the main window with a print-only stylesheet. Avoids the iOS
      // Safari quirk where iframe.contentWindow.print() prints a blank page,
      // and avoids the PWA "stuck on new window" issue with window.open.
      //
      // The style + container are created once and left in the DOM. Cleaning
      // up on `afterprint` causes a blank/wrong preview on iOS Safari, which
      // fires afterprint before it finishes rendering the preview — removing
      // our content mid-render, so iOS screenshots the underlying page. The
      // container is hidden on screen via @media screen rules; persisting it
      // is harmless.
      let style = document.getElementById('print-pdf-style');
      if (!style) {
        style = document.createElement('style');
        style.id = 'print-pdf-style';
        style.textContent = `
          @media screen { #print-pdf-container { display: none !important; } }
          @media print {
            @page { size: 8.5in 11in portrait; margin: 0.4in; }
            html, body { background: #fff !important; margin: 0 !important; padding: 0 !important; }
            body > * { display: none !important; }
            body > #print-pdf-container { display: block !important; }
            #print-pdf-container, #print-pdf-container * { visibility: visible; box-sizing: border-box; color: #000; }
            #print-pdf-container h1 { font-size: 14px; color: #1a472a; margin: 0 0 3px 0; }
            #print-pdf-container h2 { font-size: 11px; color: #666; font-weight: normal; margin: 0 0 10px 0; }
            #print-pdf-container table { width: 100%; border-collapse: collapse; font-size: 9px; border: 1px solid #ccc; }
            #print-pdf-container th, #print-pdf-container td { padding: 3px 4px; text-align: left; border: 1px solid #ccc; }
            #print-pdf-container th { background: #f5f5f5 !important; font-weight: 600; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            #print-pdf-container .legend { font-size: 10px; color: #666; margin-top: 8px; }
          }
        `;
        document.head.appendChild(style);
      }

      let container = document.getElementById('print-pdf-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'print-pdf-container';
        document.body.appendChild(container);
      }
      container.innerHTML = `
        <h1>${appData.settings.tournamentName || 'Volunteer Golf'}</h1>
        <h2>Hole #${hole} Roster - Generated ${new Date().toLocaleDateString()}</h2>
        ${table.outerHTML}
        <div class="legend">
          <span style="color:#4caf50;font-weight:600">&#10003;</span> = Checked in &nbsp;&nbsp;
          <span style="color:#1a472a;font-weight:600">&#9675;</span> = Scheduled
        </div>
      `;

      document.title = `Hole #${hole} Roster`;

      // Defer print() a tick so the injected DOM/CSS is fully applied.
      setTimeout(() => {
        try {
          window.print();
        } catch (e) {
          alert('Unable to open print dialog: ' + e.message);
        }
      }, 50);
    }

    function buildAssistsPerHoleTable() {
      var numHoles = getNumberOfHoles();
      // Collect all unique holes that have Asst. Chairman assigned (including via assignedHoles)
      var holeCounts = {};
      for (var i = 1; i <= numHoles; i++) holeCounts[i] = 0;

      appData.volunteers.forEach(function(v) {
        if (v.type !== 'Asst. Chairman') return;
        // Count primary hole
        if (v.hole && v.hole >= 1 && v.hole <= numHoles) {
          holeCounts[v.hole]++;
        }
        // Count additional assigned holes
        if (v.assignedHoles && Array.isArray(v.assignedHoles)) {
          v.assignedHoles.forEach(function(ah) {
            if (ah >= 1 && ah <= numHoles && ah !== v.hole) {
              holeCounts[ah]++;
            }
          });
        }
      });

      // Also check for holes beyond numHoles (e.g. Hole 99)
      var extraHoles = {};
      appData.volunteers.forEach(function(v) {
        if (v.type !== 'Asst. Chairman') return;
        if (v.hole && v.hole > numHoles) {
          if (!extraHoles[v.hole]) extraHoles[v.hole] = 0;
          extraHoles[v.hole]++;
        }
      });

      var html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:14px;border:1px solid #ccc">';
      html += '<thead><tr style="background:#f5f5f5">' +
        '<th style="text-align:left;padding:12px;border:1px solid #ccc;color:#1a472a;font-weight:600">Hole</th>' +
        '<th style="text-align:center;padding:12px;border:1px solid #ccc;color:#1a472a;font-weight:600">Asst. Chairman</th>' +
        '</tr></thead><tbody>';

      var grandTotal = 0;

      for (var h = 1; h <= numHoles; h++) {
        var count = holeCounts[h];
        grandTotal += count;
        var rowBg = h % 2 === 0 ? '#f9f9f9' : '#fff';
        html += '<tr style="background:' + rowBg + '">' +
          '<td style="padding:10px 12px;border:1px solid #ccc;font-weight:600;color:#1a472a">Hole ' + h + '</td>' +
          '<td style="text-align:center;padding:10px 6px;border:1px solid #ccc">' + count + '</td>' +
          '</tr>';
      }

      // Extra holes (e.g. Hole 99)
      Object.keys(extraHoles).sort(function(a, b) { return a - b; }).forEach(function(eh) {
        grandTotal += extraHoles[eh];
        html += '<tr style="background:#fff">' +
          '<td style="padding:10px 12px;border:1px solid #ccc;font-weight:600;color:#1a472a">Hole ' + eh + '</td>' +
          '<td style="text-align:center;padding:10px 6px;border:1px solid #ccc">' + extraHoles[eh] + '</td>' +
          '</tr>';
      });

      html += '<tr style="background:#e8f5e9;font-weight:600">' +
        '<td style="padding:12px;border:1px solid #ccc;color:#1a472a">TOTAL</td>' +
        '<td style="text-align:center;padding:12px 6px;border:1px solid #ccc;color:#1a472a;background:#c8e6c9">' + grandTotal + '</td>' +
        '</tr></tbody></table></div>';

      return html;
    }

    // Activity log filter state
    let activityFilterAction = 'all';
    let activityFilterUser = 'all';
    let activityFilterDate = 'all';

    function setActivityFilter(type, value) {
      if (type === 'action') activityFilterAction = value;
      if (type === 'user') activityFilterUser = value;
      if (type === 'date') activityFilterDate = value;
      render();
    }

    function clearActivityFilters() {
      activityFilterAction = 'all';
      activityFilterUser = 'all';
      activityFilterDate = 'all';
      render();
    }

    function clearActivityLog() {
      if (confirm('Are you sure you want to clear the entire activity log? This cannot be undone.')) {
        appData.activityLog = [];
        saveData();
        render();
        showToast('Activity log cleared');
      }
    }

    function exportActivityLog() {
      const logs = appData.activityLog || [];
      if (logs.length === 0) {
        alert('No activity log entries to export');
        return;
      }

      const headers = ['Timestamp', 'User', 'Type', 'Action', 'Target', 'Details'];
      const rows = logs.map(log => [
        new Date(log.timestamp).toLocaleString(),
        log.user,
        log.userType,
        log.action,
        log.target,
        log.details
      ]);

      const csvContent = [headers, ...rows]
        .map(row => row.map(cell => '"' + String(cell || '').replace(/"/g, '""') + '"').join(','))
        .join('\n');

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'activity-log-' + new Date().toISOString().split('T')[0] + '.csv';
      link.click();
    }

    function renderActivityLog() {
      const logs = appData.activityLog || [];

      // Get unique users and actions for filters
      const uniqueUsers = [...new Set(logs.map(l => l.user))].sort();
      const uniqueActions = [...new Set(logs.map(l => l.action))].sort();

      // Filter logs
      let filteredLogs = logs;
      if (activityFilterAction !== 'all') {
        filteredLogs = filteredLogs.filter(l => l.action === activityFilterAction);
      }
      if (activityFilterUser !== 'all') {
        filteredLogs = filteredLogs.filter(l => l.user === activityFilterUser);
      }
      if (activityFilterDate !== 'all') {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);

        filteredLogs = filteredLogs.filter(l => {
          const logDate = new Date(l.timestamp);
          if (activityFilterDate === 'today') {
            return logDate >= today;
          } else if (activityFilterDate === 'week') {
            return logDate >= weekAgo;
          }
          return true;
        });
      }

      // Limit display to 200 entries
      const displayLogs = filteredLogs.slice(0, 200);
      const hasMore = filteredLogs.length > 200;

      const actionLabels = {
        'login': 'Login',
        'logout': 'Logout',
        'check-in': 'Check In',
        'check-out': 'Check Out',
        'edit-volunteer': 'Edit',
        'add-volunteer': 'Add',
        'delete-volunteer': 'Delete',
        'schedule-change': 'Schedule',
        'password-change': 'Password',
        'import': 'Import',
        'submission': 'Submission',
        'settings-change': 'Settings'
      };

      // Build the table rows
      var tableRows = '';
      displayLogs.forEach(function(log) {
        var logDate = new Date(log.timestamp);
        var isToday = logDate.toDateString() === new Date().toDateString();
        var timeStr = isToday
          ? logDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          : logDate.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + logDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        var actionColors = {
          'login': '#28a745',
          'logout': '#6c757d',
          'check-in': '#007bff',
          'check-out': '#fd7e14',
          'edit-volunteer': '#17a2b8',
          'add-volunteer': '#28a745',
          'delete-volunteer': '#dc3545',
          'password-change': '#6f42c1',
          'import': '#20c997',
          'submission': '#007bff',
          'settings-change': '#ffc107'
        };
        var actionColor = actionColors[log.action] || '#666';
        var typeColor = log.userType === 'Admin' ? '#1a472a' : (log.userType === 'Captain' ? '#007bff' : '#6c757d');

        tableRows += '<tr>' +
          '<td style="font-size:12px;color:#666">' + timeStr + '</td>' +
          '<td style="font-weight:500">' + log.user + '</td>' +
          '<td><span style="background:' + typeColor + ';color:white;padding:2px 8px;border-radius:4px;font-size:11px">' + log.userType + '</span></td>' +
          '<td><span style="color:' + actionColor + ';font-weight:500">' + (actionLabels[log.action] || log.action) + '</span></td>' +
          '<td style="font-size:13px">' + (log.target || '-') + '</td>' +
          '<td style="font-size:12px;color:#666">' + (log.details || '-') + '</td>' +
          '</tr>';
      });

      // Build action filter options
      var actionOptions = '<option value="all"' + (activityFilterAction === 'all' ? ' selected' : '') + '>All Actions</option>';
      uniqueActions.forEach(function(a) {
        actionOptions += '<option value="' + a + '"' + (activityFilterAction === a ? ' selected' : '') + '>' + (actionLabels[a] || a) + '</option>';
      });

      // Build user filter options
      var userOptions = '<option value="all"' + (activityFilterUser === 'all' ? ' selected' : '') + '>All Users</option>';
      uniqueUsers.forEach(function(u) {
        userOptions += '<option value="' + u + '"' + (activityFilterUser === u ? ' selected' : '') + '>' + u + '</option>';
      });

      var emptyState = displayLogs.length === 0 ?
        '<div style="text-align:center;padding:60px 20px;color:#999">' +
        '<div style="font-size:48px;margin-bottom:15px">📋</div>' +
        '<p style="font-size:16px;margin-bottom:5px">No activity logged yet</p>' +
        '<p style="font-size:13px">Activity will appear here as users interact with the system</p>' +
        '</div>' : '';

      var tableContent = displayLogs.length > 0 ?
        '<div style="overflow-x:auto">' +
        '<table class="volunteer-table" style="min-width:800px">' +
        '<thead><tr>' +
        '<th style="width:140px">Time</th>' +
        '<th style="width:150px">User</th>' +
        '<th style="width:70px">Type</th>' +
        '<th style="width:90px">Action</th>' +
        '<th style="width:150px">Target</th>' +
        '<th>Details</th>' +
        '</tr></thead>' +
        '<tbody>' + tableRows + '</tbody>' +
        '</table></div>' : '';

      return '<div class="activity-log-section">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">' +
        '<h2 style="font-size:20px;color:#1a472a;margin:0">Activity Log</h2>' +
        '<div style="display:flex;gap:10px">' +
        '<button onclick="exportActivityLog()" style="background:#1a472a;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px">Export CSV</button>' +
        '<button onclick="clearActivityLog()" style="background:#dc3545;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px">Clear Log</button>' +
        '</div></div>' +
        '<div style="display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap;align-items:center">' +
        '<div><label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Action</label>' +
        '<select onchange="setActivityFilter(\'action\', this.value)" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px">' + actionOptions + '</select></div>' +
        '<div><label style="font-size:12px;color:#666;display:block;margin-bottom:4px">User</label>' +
        '<select onchange="setActivityFilter(\'user\', this.value)" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px">' + userOptions + '</select></div>' +
        '<div><label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Date</label>' +
        '<select onchange="setActivityFilter(\'date\', this.value)" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px">' +
        '<option value="all"' + (activityFilterDate === 'all' ? ' selected' : '') + '>All Time</option>' +
        '<option value="today"' + (activityFilterDate === 'today' ? ' selected' : '') + '>Today</option>' +
        '<option value="week"' + (activityFilterDate === 'week' ? ' selected' : '') + '>Last 7 Days</option>' +
        '</select></div>' +
        '<button onclick="clearActivityFilters()" style="background:#f5f5f5;border:1px solid #ddd;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;margin-top:18px">Clear Filters</button>' +
        '</div>' +
        '<p style="color:#666;font-size:13px;margin-bottom:15px">' +
        'Showing ' + displayLogs.length + ' of ' + filteredLogs.length + ' entries' +
        (hasMore ? ' <span style="color:#dc3545">(limited to 200)</span>' : '') +
        (logs.length > 0 ? ' &bull; Total: ' + logs.length + ' entries' : '') +
        '</p>' +
        emptyState + tableContent +
        '</div>';
    }

    // Track selected hole for admin users and chair users
    let adminSelectedHole = 1;
    let chairSelectedHole = null; // Will be set to first assigned hole on login

    function renderCaptainDashboard() {
      // For Admin users, use the selected hole instead of their assigned hole
      const isAdminUser = captainAuth.isAdmin;
      const isChairUser = captainAuth.isChair && captainAuth.assignedHoles && captainAuth.assignedHoles.length > 1;

      // Initialize chairSelectedHole if not set (exclude hole 99)
      const chairHolesFiltered = isChairUser ? captainAuth.assignedHoles.filter(h => h !== 99) : [];
      if (isChairUser && !chairSelectedHole) {
        chairSelectedHole = chairHolesFiltered[0];
      }

      const activeHole = isAdminUser ? adminSelectedHole : (isChairUser ? chairSelectedHole : captainAuth.hole);

      const holeVolunteers = appData.volunteers.filter(v => v.hole === activeHole && v.type === 'Volunteer');
      const scheduledVolunteers = holeVolunteers.filter(v => v.scheduled && v.scheduled[`${selectedDay} ${selectedShift}`]);
      const unscheduledVolunteers = holeVolunteers.filter(v => !v.scheduled || !v.scheduled[`${selectedDay} ${selectedShift}`]);

      // Get captains for this hole
      const holeCaptains = appData.volunteers.filter(v =>
        v.hole === activeHole &&
        (v.type === 'Captain' || v.type === 'Asst. Chairman' || v.type === 'Chairman')
      );

      // Find the current user's volunteer record (for admin, find by name)
      const currentUserRecord = appData.volunteers.find(v => v.name === captainAuth.name);

      const checkedInIds = new Set(
        appData.checkIns
          .filter(c => c.day === selectedDay && c.shift === selectedShift && c.hole === activeHole)
          .map(c => c.volunteerId)
      );

      const lastSubmission = appData.submissions.find(s =>
        s.hole === activeHole && s.day === selectedDay && s.shift === selectedShift
      );

      // Track what was submitted vs current state for dynamic button
      const submittedIds = lastSubmission ? new Set(lastSubmission.checkedInIds || []) : new Set();

      // Calculate changes since last submission
      const newCheckIns = [...checkedInIds].filter(id => !submittedIds.has(id)).length;
      const removedCheckIns = [...submittedIds].filter(id => !checkedInIds.has(id)).length;
      const totalChanges = newCheckIns + removedCheckIns;

      // Find co-captains (other captains, not the logged-in one)
      const coCaptains = holeCaptains.filter(v => v.name !== captainAuth.name);

      const isSubmitted = !!lastSubmission;

      // Check if this shift is locked (past cutoff time) - admin users can always edit
      const shiftLocked = !isAdminUser && isShiftLocked(selectedDay, selectedShift);

      // Get relative time info
      const timeInfo = getRelativeTimeLabel(selectedDay, selectedShift);

      // Build display list - captains first, then scheduled volunteers, then unscheduled
      let displayVolunteers = [];
      if (searchTerm) {
        displayVolunteers = appData.volunteers.filter(v =>
          v.name.toLowerCase().includes(searchTerm.toLowerCase()) &&
          (isAdminUser || v.hole === activeHole)
        );
      } else {
        // Show captains first (current captain at top), then scheduled, then unscheduled
        const sortedCaptains = holeCaptains.sort((a, b) => {
          if (a.name === captainAuth.name) return -1;
          if (b.name === captainAuth.name) return 1;
          return a.name.localeCompare(b.name);
        });
        displayVolunteers = [...sortedCaptains,
                            ...scheduledVolunteers.sort((a, b) => a.name.localeCompare(b.name)),
                            ...unscheduledVolunteers.sort((a, b) => a.name.localeCompare(b.name))];
      }

      // Build dynamic button text
      let buttonText = '';
      if (!isSubmitted) {
        // First submission - new check-ins only
        if (checkedInIds.size === 0) {
          buttonText = 'Submit';
        } else if (checkedInIds.size === 1) {
          buttonText = 'Check In 1 Volunteer';
        } else {
          buttonText = `Check In ${checkedInIds.size} Volunteers`;
        }
      } else if (newCheckIns > 0 && removedCheckIns === 0) {
        // Only new check-ins after initial submission
        if (newCheckIns === 1) {
          buttonText = 'Check In 1 Volunteer';
        } else {
          buttonText = `Check In ${newCheckIns} Volunteers`;
        }
      } else if (newCheckIns === 0 && removedCheckIns > 0) {
        // Only modifications (removals) after initial submission
        if (removedCheckIns === 1) {
          buttonText = 'Update 1 Change';
        } else {
          buttonText = `Update ${removedCheckIns} Changes`;
        }
      } else if (newCheckIns > 0 && removedCheckIns > 0) {
        // Both new check-ins and modifications
        buttonText = `Check In ${newCheckIns}, Update ${removedCheckIns}`;
      } else {
        // No changes since last submission
        buttonText = 'No Changes';
      }

      // Confirmation modal
      const modalHtml = showModal ? `
        <div class="modal-overlay" onclick="closeModal(event)">
          <div class="modal" onclick="event.stopPropagation()">
            <h3>Submit Check-In?</h3>

    function restoreArchive(index) {
      const archive = serverArchives[index];

      if (!archive) {
        alert('Archive not found');
        return;
      }

      const mode = prompt(
        `Restore "${archive.name}"?\n\n` +
        `Options:\n` +
        `1 = Full restore (replace everything)\n` +
        `2 = Volunteers only (keep current check-ins)\n` +
        `3 = Merge volunteers (add years worked to current)\n\n` +
        `Enter 1, 2, or 3:`,
        '1'
      );

      if (mode === '1') {
        appData = JSON.parse(JSON.stringify(archive.data));
        saveData();
        alert(`✓ Fully restored "${archive.name}"`);
      } else if (mode === '2') {
        const currentCheckIns = appData.checkIns;
        const currentSubmissions = appData.submissions;
        appData.volunteers = JSON.parse(JSON.stringify(archive.data.volunteers));
        appData.checkIns = currentCheckIns;
        appData.submissions = currentSubmissions;
        saveData();
        alert(`✓ Restored volunteers from "${archive.name}" (kept current check-ins)`);
      } else if (mode === '3') {
        // Merge: update yearsWorked for matching volunteers
        let updated = 0;
        archive.data.volunteers.forEach(archivedVol => {
          const match = appData.volunteers.find(v =>
            v.name.trim().toLowerCase() === archivedVol.name.trim().toLowerCase()
          );

            match.yearsWorked = archivedVol.yearsWorked;
            updated++;

        return;

      render();
    }

    function downloadArchiveCSV(index) {
      const archive = serverArchives[index];
      if (!archive) {
        alert('Archive not found');
        return;
      }

      const data = archive.data;
      const rows = [];

      // Build schedule column headers
      const archSchedHeaders = [];
      DAYS.forEach(day => SHIFTS.forEach(shift => archSchedHeaders.push(`Scheduled ${day} ${shift}`)));

      // CSV header
      rows.push([
        'Vol ID',
        'Name',
        'Type',
        'Hole',
        'Phone',
        'Email',
        'Address',
        'Years Worked',
        'Hat',
        'Hat Received',
        'Notes',
        'Assigned Holes',
        ...archSchedHeaders,
        'Checked In',
        'Check-In Day',
        'Check-In Shift',
        'Check-In Time',
        'Checked In By'
      ].join(','));

      // Build a map of check-ins by volunteer ID
      const checkInMap = {};
      (data.checkIns || []).forEach(ci => {
        if (!checkInMap[ci.volunteerId]) {
          checkInMap[ci.volunteerId] = [];
        }
        checkInMap[ci.volunteerId].push(ci);
      });

      // Add a row for each volunteer
      (data.volunteers || []).forEach(vol => {
        const checkIns = checkInMap[vol.id] || [];

        // Build common volunteer fields
        const schedVals = [];
        DAYS.forEach(day => SHIFTS.forEach(shift => {
          schedVals.push(vol.scheduled && vol.scheduled[`${day} ${shift}`] ? '1' : '0');
        }));
        const volFields = [
          escapeCSV(vol.volId || ''),
          escapeCSV(vol.name),
          escapeCSV(vol.type),
          vol.hole,
          escapeCSV(vol.phone || ''),
          escapeCSV(vol.email || ''),
          escapeCSV(vol.address || ''),
          vol.yearsWorked || 0,
          escapeCSV(vol.hat || ''),
          vol.hatReceived ? 'Yes' : 'No',
          escapeCSV(vol.notes || ''),
          vol.assignedHoles ? vol.assignedHoles.join(';') : '',
          ...schedVals
        ];

        if (checkIns.length === 0) {
          rows.push([...volFields, 'No', '', '', '', ''].join(','));
        } else {
          checkIns.forEach(ci => {
            rows.push([
              ...volFields,
              'Yes',
              escapeCSV(ci.day || ''),
              escapeCSV(ci.shift || ''),
              ci.timestamp ? new Date(ci.timestamp).toLocaleString() : '',
              escapeCSV(ci.checkedInBy || '')
            ].join(','));
          });
        }
      });

      // Create and download the file
      const csvContent = rows.join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${archive.name.replace(/[^a-z0-9]/gi, '_')}_export.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function escapeCSV(str) {
      if (str == null) return '';
      str = String(str);
      if (str.includes(',') || str.includes('"') || str.includes('\n')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }

    function parseCSV(text) {
      const rows = [];
      let current = '';
      let inQuotes = false;
      let row = [];
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (inQuotes) {
          if (char === '"') {
            if (i + 1 < text.length && text[i + 1] === '"') {
              current += '"';
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            current += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            row.push(current.trim());
            current = '';
          } else if (char === '\n' || char === '\r') {
            if (char === '\r' && i + 1 < text.length && text[i + 1] === '\n') i++;
            row.push(current.trim());
            if (row.length > 1 || row[0] !== '') rows.push(row);
            row = [];
            current = '';
          } else {
            current += char;
          }
        }
      }
      row.push(current.trim());
      if (row.length > 1 || row[0] !== '') rows.push(row);
      return rows;
    }

      reader.onload = function(e) {
        try {
          const importData = JSON.parse(e.target.result);

          if (importData.type !== 'volunteer_golf_backup') {
            alert('Invalid backup file format');
            return;
          }

          const mode = prompt(
            'Found backup from ' + new Date(importData.exportedAt).toLocaleDateString() + '\n\n' +
            'Contains:\n' +
            '- ' + importData.currentData.volunteers.length + ' volunteers\n' +
            '- ' + importData.currentData.checkIns.length + ' check-ins\n' +
            '- ' + importData.archives.length + ' archived tournament(s)\n\n' +
            'Options:\n' +
            '1 = Restore everything (replace all data)\n' +
            '2 = Import archives only (add to existing)\n' +
            '3 = Cancel\n\n' +
            'Enter 1, 2, or 3:',
            '1'
          );

          if (mode === '1') {
            appData = JSON.parse(JSON.stringify(importData.currentData));
            saveData();
            serverArchives = importData.archives || [];
            saveArchivesToServer();
            alert('Full backup restored!');
          } else if (mode === '2') {
            serverArchives = serverArchives.concat(importData.archives || []);
            saveArchivesToServer();
            alert('Added ' + importData.archives.length + ' archive(s)');
          } else {
            return;
          }

          render();
        } catch (err) {
          alert('Error reading backup file: ' + err.message);
        }
      };
      reader.readAsText(file);
      input.value = '';
    }

    function toggleCheckIn(volunteerId) {
      // For admin users, use the selected hole; for chair users, use selected hole; for captains, use their assigned hole
      const isChairUser = captainAuth.isChair && captainAuth.assignedHoles && captainAuth.assignedHoles.length > 1;
      const activeHole = captainAuth.isAdmin ? adminSelectedHole : (isChairUser ? chairSelectedHole : captainAuth.hole);

      const existing = appData.checkIns.find(c =>
        c.volunteerId === volunteerId && c.day === selectedDay && c.shift === selectedShift && c.hole === activeHole
      );

      const volunteer = appData.volunteers.find(v => v.id === volunteerId);
      const volunteerName = volunteer ? volunteer.name : 'Unknown';
      const isAlternate = !(volunteer && volunteer.scheduled && volunteer.scheduled[`${selectedDay} ${selectedShift}`]);

      // Optimistic local update so the UI feels instant
      let snapshot;
      if (existing) {
        snapshot = appData.checkIns;
        appData.checkIns = appData.checkIns.filter(c =>
          !(c.volunteerId === volunteerId && c.day === selectedDay && c.shift === selectedShift && c.hole === activeHole)
        );
      } else {
        snapshot = appData.checkIns.slice();
        appData.checkIns.push({
          volunteerId,
          volunteerName: volunteerName,
          hole: activeHole,
          day: selectedDay,
          shift: selectedShift,
          timestamp: new Date().toISOString(),
          checkedInBy: captainAuth.name,
          isAlternate: isAlternate
        });
      }
      render();

      // Atomic single-checkin endpoint — server holds the mutex, broadcasts
      // only the small checkIn/checkOut event, and never rewrites the full
      // dataset. Avoids the lost-checkin race when many captains are checking
      // people in simultaneously.
      fetch('/api/checkin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Socket-ID': (socket && socket.id) || '' },
        body: JSON.stringify({
          action: existing ? 'remove' : 'add',
          volunteerId,
          volunteerName,
          hole: activeHole,
          day: selectedDay,
          shift: selectedShift,
          checkedInBy: captainAuth.name,
          isAlternate: isAlternate
        })
      }).then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      }).then(function(result) {
        if (!result || !result.success) throw new Error(result && result.error || 'Save failed');
      }).catch(function(err) {
        console.error('Check-in save failed:', err);
        // Roll back the optimistic update
        appData.checkIns = snapshot;
        render();
        showToast('Check-in failed — please try again');
      });
    }

    function hasCaptainScheduleChanged() {
      if (!captainEditingVolunteer) return false;
      var original = captainEditingVolunteer.scheduled || {};
      var changed = false;
      DAYS.forEach(function(day) {
        SHIFTS.forEach(function(shift) {
          var key = day + ' ' + shift;
          var checkbox = document.getElementById('cap_sched_' + day + '_' + shift);
          var isNowChecked = checkbox && checkbox.checked;
          var wasChecked = !!original[key];
          if (isNowChecked !== wasChecked) changed = true;
        });
      });
      return changed;
    }

    async function saveCaptainVolunteerEdit() {
      if (!captainEditingVolunteer) return;

      // Get new schedule from form
      const newSchedule = {};
      DAYS.forEach(day => {
        SHIFTS.forEach(shift => {
          const checkbox = document.getElementById('cap_sched_' + day + '_' + shift);
          if (checkbox && checkbox.checked) {
            newSchedule[day + ' ' + shift] = true;
          }
        });
      });

      // Find and update the volunteer
      const idx = appData.volunteers.findIndex(v => v.id === captainEditingVolunteer.id);
      if (idx === -1) {
        alert('Volunteer not found');
        return;
      }

      const oldSchedule = appData.volunteers[idx].scheduled || {};
      appData.volunteers[idx].scheduled = newSchedule;
      saveData();

      // Check if we should send email
      const sendEmail = document.getElementById('sendScheduleEmail');
      if (sendEmail && sendEmail.checked) {
        const vol = appData.volunteers[idx];
        if (vol.email) {
          try {
            await sendScheduleEmail(vol, newSchedule);
            alert('Schedule updated and email sent to ' + vol.email);
          } catch (err) {
            alert('Schedule updated but email failed: ' + err.message);
          }
        } else {
          alert('Schedule updated but no email on file for this volunteer.');
        }
      } else {
        alert('Schedule updated successfully!');
      }

      captainEditingVolunteer = null;
      render();
    }

    function handleImportUpdate(rows, headers, nameCol) {
      const typeCol = headers.findIndex(h => h.includes('Volunteer Type') || h === 'Type');
      const holeCol = headers.findIndex(h => h.includes('Assigned Location') || h === 'Hole');
      const phoneCol = headers.findIndex(h => h.includes('Phone_Cell') || h.includes('Cell'));
      const idCol = headers.findIndex(h => h.includes('Vol ID') || h === 'ID');

      // Map CSV headers to volunteer fields
      const fieldMappings = [
        { field: 'email', match: h => h.toLowerCase() === 'email' || h.toLowerCase().includes('email'), type: 'string' },
        { field: 'phone', match: h => h.toLowerCase() === 'phone' || h.toLowerCase().includes('phone'), type: 'string' },
        { field: 'type', match: h => h.toLowerCase() === 'type' || h.toLowerCase() === 'volunteer type', type: 'string' },
        { field: 'hole', match: h => h.toLowerCase() === 'hole' || h.toLowerCase().includes('assigned location'), type: 'int' },
        { field: 'yearsWorked', match: h => h.includes('Years Worked') || h === 'Years' || h.includes('Years_Worked') || h.toLowerCase() === 'years', type: 'int' },
        { field: 'hat', match: h => h.toLowerCase() === 'hat', type: 'string' },
        { field: 'hatReceived', match: h => h.toLowerCase() === 'hat received' || h.toLowerCase() === 'hatreceived', type: 'bool' },
        { field: 'notes', match: h => h.toLowerCase() === 'notes', type: 'string' },
        { field: 'address', match: h => h.toLowerCase() === 'address', type: 'string' },
        { field: 'volId', match: h => h.toLowerCase() === 'vol id' || h.toLowerCase() === 'volid', type: 'string' },
        { field: 'assignedHoles', match: h => h.toLowerCase() === 'assigned holes' || h.toLowerCase() === 'assignedholes', type: 'holesArray' }
      ];

      // Find which columns exist in the CSV
      const columnsToUpdate = [];
      fieldMappings.forEach(mapping => {
        const colIdx = headers.findIndex(mapping.match);
        if (colIdx >= 0 && colIdx !== nameCol) {
          columnsToUpdate.push({ ...mapping, colIdx });
        }
      });

      // Also check for scheduled shift columns
      const scheduleColumns = [];
      DAYS.forEach(day => {
        SHIFTS.forEach(shift => {
          const colName = `Scheduled ${day} ${shift}`;
          const colIdx = headers.findIndex(h => h === colName);
          if (colIdx >= 0) {
            scheduleColumns.push({ day, shift, colIdx });
          }
        });
      });

      let updated = 0;
      let added = 0;
      const fieldCounts = {};
      columnsToUpdate.forEach(c => fieldCounts[c.field] = 0);

      rows.slice(1).filter(r => r.length > 1 && r[nameCol]).forEach(row => {
        const name = row[nameCol].trim();
        if (!name) return;

        // Find volunteer by name (case-insensitive, trimmed)
        const volIdx = appData.volunteers.findIndex(v =>
          v.name.trim().toLowerCase() === name.toLowerCase()
        );

        if (volIdx >= 0) {
          let wasUpdated = false;
          columnsToUpdate.forEach(col => {
            const value = row[col.colIdx];
            if (value !== undefined && value.toString().trim() !== '') {
              if (col.type === 'int') {
                appData.volunteers[volIdx][col.field] = parseInt(value) || 0;
              } else if (col.type === 'bool') {
                const v = value.trim().toLowerCase();
                appData.volunteers[volIdx][col.field] = (v === '1' || v === 'yes' || v === 'true');
              } else if (col.type === 'holesArray') {
                appData.volunteers[volIdx][col.field] = value.split(';').map(h => parseInt(h.trim())).filter(h => !isNaN(h));
              } else {
                appData.volunteers[volIdx][col.field] = value.trim();
              }
              fieldCounts[col.field]++;
              wasUpdated = true;
            }
          });
          // Update scheduled shifts if present
          if (scheduleColumns.length > 0) {
            if (!appData.volunteers[volIdx].scheduled) appData.volunteers[volIdx].scheduled = {};
            scheduleColumns.forEach(sc => {
              const val = row[sc.colIdx];
              const key = `${sc.day} ${sc.shift}`;
              if (val === '1' || (val && val.toLowerCase() === 'yes') || (val && val.toLowerCase() === 'true')) {
                appData.volunteers[volIdx].scheduled[key] = true;
                wasUpdated = true;
              } else if (val === '0' || (val && val.toLowerCase() === 'no') || (val && val.toLowerCase() === 'false')) {
                delete appData.volunteers[volIdx].scheduled[key];
                wasUpdated = true;
              }
            });
          }
          if (wasUpdated) updated++;
        } else {
          // Add as new volunteer
          const scheduled = {};
          scheduleColumns.forEach(sc => {
            const val = row[sc.colIdx];
            const key = `${sc.day} ${sc.shift}`;
            if (val === '1' || (val && val.toLowerCase() === 'yes') || (val && val.toLowerCase() === 'true')) {
              scheduled[key] = true;
            }
          });

          const newVol = {
            id: idCol >= 0 && row[idCol] ? row[idCol] : String(Date.now() + Math.random()).replace('.', ''),
            name: name,
            type: typeCol >= 0 && row[typeCol] ? row[typeCol] : 'Volunteer',
            hole: holeCol >= 0 ? parseInt(row[holeCol]) || 0 : 0,
            phone: phoneCol >= 0 ? row[phoneCol] || '' : '',
            email: '',
            yearsWorked: 0,
            hat: '',
            scheduled
          };
          // Apply any mapped fields
          columnsToUpdate.forEach(col => {
            const value = row[col.colIdx];
            if (value !== undefined && value.toString().trim() !== '') {
              if (col.type === 'int') newVol[col.field] = parseInt(value) || 0;
              else if (col.type === 'bool') { const v = value.trim().toLowerCase(); newVol[col.field] = (v === '1' || v === 'yes' || v === 'true'); }
              else if (col.type === 'holesArray') newVol[col.field] = value.split(';').map(h => parseInt(h.trim())).filter(h => !isNaN(h));
              else newVol[col.field] = value.trim();
            }
          });
          appData.volunteers.push(newVol);
          added++;
        }
      });

      saveData();

      let msg = '';
      if (updated > 0) msg += 'Updated ' + updated + ' volunteer(s).';
      if (added > 0) msg += (msg ? '\n' : '') + 'Added ' + added + ' new volunteer(s).';
      if (!msg) msg = 'No changes were made.';
      const fieldLabels = { email: 'emails', phone: 'phones', type: 'types', hole: 'holes', yearsWorked: 'years', hat: 'hats', hatReceived: 'hat received flags', notes: 'notes', assignedHoles: 'assigned holes' };
      if (scheduleColumns.length > 0 && updated > 0) {
        msg += '\n• Schedule shifts updated';
      }
      columnsToUpdate.forEach(col => {
        if (fieldCounts[col.field] > 0) {
          msg += '\n• ' + fieldCounts[col.field] + ' ' + (fieldLabels[col.field] || col.field) + ' updated';
        }
      });
      logActivity('import', '', 'Updated/added volunteers from CSV: ' + updated + ' updated, ' + added + ' added');
      alert(msg);
      render();
    }
