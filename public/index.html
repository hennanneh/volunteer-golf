    async function sendEmailToHole() {
      const hole = emailHoleNumber;
      if (!hole) return;

      // Get all volunteers and captains on this hole
      const holeVolunteers = appData.volunteers.filter(v => v.hole === hole);
      const volunteersWithEmail = holeVolunteers.filter(v => v.email);

      if (volunteersWithEmail.length === 0) {
        alert('No volunteers with email addresses found for this hole.');
        return;
      }

      const emails = volunteersWithEmail.map(v => v.email).filter(e => e && e.trim());

      if (emails.length === 0) {
        alert('No valid email addresses found for volunteers on this hole.');
        return;
      }

      // Build the roster HTML for the email
      const dayFilter = reportFilters.day;
      const days = dayFilter === 'all' ? DAYS : [dayFilter];

      let rosterHtml = '<table style="width:100%;border-collapse:collapse;font-size:14px;margin-top:20px">';
      rosterHtml += '<thead><tr style="background:#f8f9fa">';
      rosterHtml += '<th style="text-align:left;padding:10px;border:1px solid #ddd">Volunteer</th>';
      rosterHtml += '<th style="text-align:left;padding:10px;border:1px solid #ddd">Type</th>';
      days.forEach(d => {
        rosterHtml += '<th style="text-align:center;padding:10px;border:1px solid #ddd" colspan="2">' + d.slice(0, 3) + '</th>';
      });
      rosterHtml += '</tr><tr style="background:#f8f9fa">';
      rosterHtml += '<th style="border:1px solid #ddd"></th><th style="border:1px solid #ddd"></th>';
      days.forEach(() => {
        rosterHtml += '<th style="text-align:center;padding:6px;border:1px solid #ddd;font-size:11px;font-weight:normal;color:#666">AM</th>';
        rosterHtml += '<th style="text-align:center;padding:6px;border:1px solid #ddd;font-size:11px;font-weight:normal;color:#666">PM</th>';
      });
      rosterHtml += '</tr></thead><tbody>';

      // Calculate totals
      const shiftTotals = {};
      days.forEach(day => {
        SHIFTS.forEach(shift => {
          const key = day + ' ' + shift;
          shiftTotals[key] = holeVolunteers.filter(v => v.scheduled && v.scheduled[key]).length;
        });
      });

      // Add totals row at top
      rosterHtml += '<tr style="background:#f0f7f0;font-weight:600">';
      rosterHtml += '<td style="padding:10px;border:1px solid #ddd" colspan="2">Total Scheduled</td>';
      days.forEach(day => {
        SHIFTS.forEach(shift => {
          const key = day + ' ' + shift;
          rosterHtml += '<td style="text-align:center;padding:10px;border:1px solid #ddd;color:#1a472a">' + shiftTotals[key] + '</td>';
        });
      });
      rosterHtml += '</tr>';

      // Add volunteers
      holeVolunteers.forEach(v => {
        rosterHtml += '<tr>';
        rosterHtml += '<td style="padding:10px;border:1px solid #ddd">' + v.name + '</td>';
        rosterHtml += '<td style="padding:10px;border:1px solid #ddd;font-size:12px;color:#666">' + (v.type || '-') + '</td>';
        days.forEach(day => {
          SHIFTS.forEach(shift => {
            const key = day + ' ' + shift;
            const isScheduled = v.scheduled && v.scheduled[key];
            let icon = '';
            let color = '#ccc';
            if (isScheduled) { icon = '●'; color = '#1a472a'; }
            rosterHtml += '<td style="text-align:center;padding:10px;border:1px solid #ddd;color:' + color + ';font-weight:600">' + icon + '</td>';
          });
        });
        rosterHtml += '</tr>';
      });
      rosterHtml += '</tbody></table>';

      // Get custom message from textarea
      const customMessage = document.getElementById('emailHoleMessage')?.value || '';

      const subject = 'Hole #' + hole + ' Roster - ' + (appData.settings.tournamentName || 'Volunteer Golf');
      let message = '<div style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;max-width:800px;margin:0 auto">';
      message += '<h2 style="color:#1a472a;margin-bottom:10px">Hole #' + hole + ' Roster</h2>';
      message += '<p style="color:#666;margin-bottom:20px">' + (appData.settings.tournamentName || 'Volunteer Golf') + '</p>';

      if (customMessage) {
        message += '<div style="background:#f8f9fa;border-left:4px solid #1a472a;padding:15px;margin-bottom:20px">';
        message += '<p style="margin:0;color:#333;white-space:pre-wrap">' + customMessage.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</p>';
        message += '</div>';
      }

      message += rosterHtml;
      message += '<p style="color:#666;font-size:12px;margin-top:20px">● = Scheduled</p>';
      message += '</div>';

      try {
        const btn = document.getElementById('sendEmailHoleBtn');
        if (btn) {
          btn.disabled = true;
          btn.textContent = 'Sending...';
        }

        await sendEmail(emails, subject, message);
        alert('Email sent successfully to ' + emails.length + ' volunteer(s)!');
        closeEmailHoleModal();
      } catch (err) {
        alert('Failed to send email: ' + err.message);
        const btn = document.getElementById('sendEmailHoleBtn');
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Send Email';
        }
      }
    }

          <div class="settings-card" style="border:2px solid #1a472a">

            <p style="color:#666;font-size:12px;margin-bottom:15px">Save your current tournament data before starting a new year, or restore data from a previous year.</p>

            <div id="archivesList">

          <div class="settings-card" style="border:2px solid #2196f3">
            <h3 style="color:#2196f3">Pairings Sheet</h3>
            <p style="color:#666;font-size:12px;margin-bottom:15px">Add a link to the tournament pairings sheet on the landing page.</p>
            
            <div style="margin-bottom:15px">
              <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
                <input type="checkbox" ${appData.settings.showPairingsLink !== false ? "checked" : ""} onchange="updateSetting('showPairingsLink', this.checked)" style="width:18px;height:18px">

            </div>
            
            <div style="margin-bottom:15px">
              <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Link Text</label>
              <input type="text" placeholder="Pairings Sheet" value="${appData.settings.pairingsText || 'Pairings Sheet'}" onchange="updateSetting('pairingsText', this.value)" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px">
            </div>
            
            <div style="margin-bottom:15px">
              <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Pairings URL</label>
              <input type="url" placeholder="https://pgatour.com/..." value="${appData.settings.pairingsUrl || ''}" onchange="updateSetting('pairingsUrl', this.value)" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px">
            </div>
          </div>
          <div class="settings-card" style="border:2px solid #9c27b0">
            <h3 style="color:#9c27b0">Branding / White Label</h3>
            <p style="color:#666;font-size:12px;margin-bottom:15px">Customize the "Powered by" footer that appears on all pages.</p>
            
            <div style="margin-bottom:15px">
              <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
                <input type="checkbox" ${appData.settings.showPoweredBy !== false ? "checked" : ""} onchange="updateSetting('showPoweredBy', this.checked)" style="width:18px;height:18px">
                <span style="font-size:14px">Show "Powered by" footer</span>
              </label>

            <div style="margin-bottom:12px">
              <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Brand Name</label>
              <input type="text" placeholder="Volunteer Golf" value="${appData.settings.poweredByText || 'Volunteer Golf'}" onchange="updateSetting('poweredByText', this.value)" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px">

            <div style="margin-bottom:12px">
              <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Brand URL (optional)</label>
              <input type="url" placeholder="https://yourcompany.com" value="${appData.settings.poweredByUrl || ''}" onchange="updateSetting('poweredByUrl', this.value)" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px">
            </div>
            <p style="color:#999;font-size:11px;margin-top:8px">Leave URL blank to show text without a link. Uncheck to completely hide the footer.</p>
          </div>

          <div class="settings-card danger-zone">
            <h3>Danger Zone</h3>
            <p style="color:#666;font-size:12px;margin-bottom:15px">These actions permanently delete data and cannot be undone.</p>

            <div style="margin-bottom:15px">
              <button class="danger-btn warning" onclick="confirmClearCheckIns()">Clear Check-Ins Only</button>
              <p style="color:#888;font-size:11px;margin-top:5px">Removes all check-in records but keeps volunteer information and assignments.</p>

            <div style="margin-bottom:15px">
              <button class="danger-btn warning" onclick="confirmClearSubmissions()" style="background:#9c27b0">Clear Submissions</button>
              <p style="color:#888;font-size:11px;margin-top:5px">Removes all captain submissions but keeps volunteer information.</p>
            </div>

            <div>
              <button class="danger-btn danger" onclick="confirmClearAllData()">Clear All Data</button>

    function renderArchivesList() {
      var archives = getArchives();
      if (archives.length === 0) {
        return '<p style="color:#999;font-size:12px;font-style:italic">No archives saved yet.</p>';
      }

      return `
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead>
            <tr style="border-bottom:1px solid #ddd">
              <th style="text-align:left;padding:8px 0">Year/Name</th>
              <th style="text-align:center;padding:8px 0">Volunteers</th>
              <th style="text-align:center;padding:8px 0">Check-ins</th>
              <th style="text-align:right;padding:8px 0">Actions</th>
            </tr>
          </thead>
          <tbody>
            ${archives.map((a, i) => `
              <tr style="border-bottom:1px solid #eee">
                <td style="padding:10px 0">
                  <strong>${a.name}</strong>
                  <div style="font-size:11px;color:#999">${new Date(a.savedAt).toLocaleDateString()}</div>
                </td>
                <td style="text-align:center">${a.volunteerCount}</td>
                <td style="text-align:center">${a.checkInCount}</td>
                <td style="text-align:right">
                  <button onclick="downloadArchiveCSV(${i})" style="padding:5px 10px;background:#2196F3;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;margin-right:5px">CSV</button>
                  <button onclick="restoreArchive(${i})" style="padding:5px 10px;background:#1a472a;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;margin-right:5px">Restore</button>
                  <button onclick="deleteArchive(${i})" style="padding:5px 10px;background:#dc3545;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px">Delete</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    // Track selected hole for admin users and chair users
    let adminSelectedHole = 1;
    let chairSelectedHole = null; // Will be set to first assigned hole on login

    function renderCaptainDashboard() {
      // For Admin users, use the selected hole instead of their assigned hole
      const isAdminUser = captainAuth.isAdmin;
      const isChairUser = captainAuth.isChair && captainAuth.assignedHoles && captainAuth.assignedHoles.length > 1;

      // Initialize chairSelectedHole if not set
      if (isChairUser && !chairSelectedHole) {
        chairSelectedHole = captainAuth.assignedHoles[0];
      }

      const activeHole = isAdminUser ? adminSelectedHole : (isChairUser ? chairSelectedHole : captainAuth.hole);

      const holeVolunteers = appData.volunteers.filter(v => v.hole === activeHole && v.type === 'Volunteer');
      const scheduledVolunteers = holeVolunteers.filter(v => v.scheduled && v.scheduled[`${selectedDay} ${selectedShift}`]);
      const unscheduledVolunteers = holeVolunteers.filter(v => !v.scheduled || !v.scheduled[`${selectedDay} ${selectedShift}`]);

      // Get captains for this hole
      const holeCaptains = appData.volunteers.filter(v =>
        v.hole === activeHole &&
        (v.type === 'Captain' || v.type === 'Asst. Chairman' || v.type === 'Chairman')
      );

      // Find the current user's volunteer record (for admin, find by name)
      const currentUserRecord = appData.volunteers.find(v => v.name === captainAuth.name);

      const checkedInIds = new Set(
        appData.checkIns
          .filter(c => c.day === selectedDay && c.shift === selectedShift && c.hole === activeHole)
          .map(c => c.volunteerId)
      );

      // Auto-check in the captain on first load if not already checked in and no submission yet (only for non-admin captains)
      const lastSubmission = appData.submissions.find(s =>
        s.hole === activeHole && s.day === selectedDay && s.shift === selectedShift
      );
      // Don't auto-check-in if shift is locked
      const shiftIsLocked = !isAdminUser && isShiftLocked(selectedDay, selectedShift);
      if (!shiftIsLocked && !isAdminUser && currentUserRecord && currentUserRecord.hole === activeHole && !checkedInIds.has(currentUserRecord.id) && !lastSubmission) {
        // Auto-add captain check-in
        appData.checkIns.push({
          volunteerId: currentUserRecord.id,
          volunteerName: currentUserRecord.name,
          hole: activeHole,
          day: selectedDay,
          shift: selectedShift,
          timestamp: new Date().toISOString(),
          checkedInBy: captainAuth.name,
          isAlternate: false
        });
        checkedInIds.add(currentUserRecord.id);
        saveData();
      }

      // Track what was submitted vs current state for dynamic button
      const submittedIds = lastSubmission ? new Set(lastSubmission.checkedInIds || []) : new Set();

      // Calculate changes since last submission
      const newCheckIns = [...checkedInIds].filter(id => !submittedIds.has(id)).length;
      const removedCheckIns = [...submittedIds].filter(id => !checkedInIds.has(id)).length;
      const totalChanges = newCheckIns + removedCheckIns;

      // Find co-captains (other captains, not the logged-in one)
      const coCaptains = holeCaptains.filter(v => v.name !== captainAuth.name);

      const isSubmitted = !!lastSubmission;

      // Check if this shift is locked (past cutoff time) - admin users can always edit
      const shiftLocked = !isAdminUser && isShiftLocked(selectedDay, selectedShift);

      // Get relative time info
      const timeInfo = getRelativeTimeLabel(selectedDay, selectedShift);

      // Build display list - captains first, then scheduled volunteers, then unscheduled
      let displayVolunteers = [];
      if (searchTerm) {
        displayVolunteers = appData.volunteers.filter(v =>
          v.name.toLowerCase().includes(searchTerm.toLowerCase()) &&
          (isAdminUser || v.hole === activeHole)
        );
      } else {
        // Show captains first (current captain at top), then scheduled, then unscheduled
        const sortedCaptains = holeCaptains.sort((a, b) => {
          if (a.name === captainAuth.name) return -1;
          if (b.name === captainAuth.name) return 1;
          return a.name.localeCompare(b.name);
        });
        displayVolunteers = [...sortedCaptains,
                            ...scheduledVolunteers.sort((a, b) => a.name.localeCompare(b.name)),
                            ...unscheduledVolunteers.sort((a, b) => a.name.localeCompare(b.name))];
      }

      // Build dynamic button text
      let buttonText = '';
      if (!isSubmitted) {
        // First submission - new check-ins only
        if (checkedInIds.size === 0) {
          buttonText = 'Submit';
        } else if (checkedInIds.size === 1) {
          buttonText = 'Check In 1 Volunteer';
        } else {
          buttonText = `Check In ${checkedInIds.size} Volunteers`;
        }
      } else if (newCheckIns > 0 && removedCheckIns === 0) {
        // Only new check-ins after initial submission
        if (newCheckIns === 1) {
          buttonText = 'Check In 1 Volunteer';
        } else {
          buttonText = `Check In ${newCheckIns} Volunteers`;
        }
      } else if (newCheckIns === 0 && removedCheckIns > 0) {
        // Only modifications (removals) after initial submission
        if (removedCheckIns === 1) {
          buttonText = 'Update 1 Change';
        } else {
          buttonText = `Update ${removedCheckIns} Changes`;
        }
      } else if (newCheckIns > 0 && removedCheckIns > 0) {
        // Both new check-ins and modifications
        buttonText = `Check In ${newCheckIns}, Update ${removedCheckIns}`;
      } else {
        // No changes since last submission
        buttonText = 'No Changes';
      }

      // Confirmation modal
      const modalHtml = showModal ? `
        <div class="modal-overlay" onclick="closeModal(event)">
          <div class="modal" onclick="event.stopPropagation()">
            <h3>Submit Check-In?</h3>
            <p style="text-align:left">
              You are submitting check-ins for <strong>Hole #${activeHole}</strong> - <strong>${timeInfo.label}</strong>.
              ${captainNotes ? `<br><br><em style="color:#666">Note: "${captainNotes}"</em>` : ''}
              <br><br><strong>${checkedInIds.size}</strong> volunteer${checkedInIds.size !== 1 ? 's' : ''} checked in.
            </p>
            <div class="modal-buttons">
              <button class="modal-btn cancel" onclick="showModal=null;render()">Cancel</button>
              <button class="modal-btn confirm" onclick="confirmSubmission()">Submit</button>
            </div>
          </div>
        </div>
      ` : '';

      // Success modal
      const successModalHtml = showSuccessModal ? `
        <div class="modal-overlay" onclick="closeSuccessModal()">
          <div class="modal" onclick="event.stopPropagation()">
            <h3 style="font-size:24px">✓ ${successMessage.title}</h3>
            <p>Hole #${activeHole} ${successMessage.message}</p>
            <div class="modal-buttons" style="justify-content:center">
              <button class="modal-btn confirm" onclick="closeSuccessModal()">Close</button>
            </div>
          </div>
        </div>
      ` : '';

      // Help modal
      const helpModalHtml = showHelpModal ? `
        <div class="modal-overlay" onclick="showHelpModal=false;render()">
          <div class="modal" onclick="event.stopPropagation()" style="max-width:450px;text-align:left">
            <h3 style="text-align:center">How to Check In Volunteers</h3>
            <ol style="padding-left:20px;line-height:1.8;color:#444;font-size:13px">
              <li>Select your <strong>day</strong> and <strong>shift</strong> (Morning/Afternoon) at the top.</li>
              <li>Volunteers are organized into sections: <strong>Captains</strong>, <strong>Scheduled Volunteers</strong>, and <strong>Not Scheduled This Shift</strong>.</li>
              <li>Tap a volunteer's name as they arrive. A green checkmark confirms they're checked in.</li>
              <li>Check-ins save automatically - no submit button needed.</li>
              <li>Tap the <strong>Submit</strong> button at the bottom to finalize the shift and add any notes.</li>
            </ol>
            <p style="margin-top:15px;font-size:13px;color:#666"><strong>If someone doesn't show up:</strong> Just leave them unchecked. Only mark the people who actually arrive.</p>
            <p style="margin-top:10px;font-size:13px;color:#666"><strong>If you make a mistake:</strong> Tap their name again to uncheck them.</p>
            <p style="margin-top:10px;font-size:13px;color:#1a472a"><strong>Edit schedules:</strong> Tap the "Edit" button next to a volunteer to modify their schedule.</p>
            ${isChairUser ? `<p style="margin-top:10px;font-size:13px;color:#1a472a"><strong>Multiple holes:</strong> Use the hole dropdown at the top to switch between your assigned holes.</p>` : ''}
            ${isAdminUser ? `<p style="margin-top:10px;font-size:13px;color:#1a472a"><strong>Admin mode:</strong> Use the hole dropdown to switch between any hole.</p>` : ''}
            <p style="margin-top:10px;font-size:13px;color:#666"><strong>Roster:</strong> Tap the "Roster" button to view or print your hole's full schedule.</p>
            <div class="modal-buttons" style="margin-top:20px;justify-content:center">
              <button class="modal-btn confirm" onclick="showHelpModal=false;render()">Got it</button>
            </div>
          </div>
        </div>
      ` : '';

      // PIN setup modal (first-time login)
      const pinSetupModalHtml = showPinSetupModal ? `
        <div class="modal-overlay">
          <div class="modal" onclick="event.stopPropagation()" style="max-width:400px;text-align:left">
            <h3 style="text-align:center;margin-bottom:15px">Set Your PIN</h3>
            <p style="font-size:13px;color:#666;margin-bottom:20px;text-align:center">Welcome! Please create a 4-digit PIN for future logins. This replaces using your phone number.</p>
            <form id="pinSetupForm">
              <div style="margin-bottom:15px">
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">New 4-Digit PIN</label>
                <input type="tel" id="newPinInput" maxlength="4" pattern="[0-9]{4}" inputmode="numeric" placeholder="0000" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:18px;text-align:center;letter-spacing:8px" required>
              </div>
              <div style="margin-bottom:20px">
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">Confirm PIN</label>
                <input type="tel" id="confirmPinInput" maxlength="4" pattern="[0-9]{4}" inputmode="numeric" placeholder="0000" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:18px;text-align:center;letter-spacing:8px" required>
              </div>
              <div class="modal-buttons">
                <button type="button" class="modal-btn cancel" onclick="showPinSetupModal=false;render()">Skip for Now</button>
                <button type="submit" class="modal-btn confirm">Set PIN</button>
              </div>
            </form>
          </div>
        </div>
      ` : '';

      // Captain editing volunteer schedule modal
      const captainEditModalHtml = captainEditingVolunteer ? `
        <div class="modal-overlay" onclick="captainEditingVolunteer=null;render()">
          <div class="modal" onclick="event.stopPropagation()" style="max-width:500px;max-height:90vh;overflow-y:auto;text-align:left">
            <h3 style="text-align:center;margin-bottom:15px">Edit Schedule: ${captainEditingVolunteer.name}</h3>
            <p style="font-size:12px;color:#666;margin-bottom:15px;text-align:center">Modify this volunteer's schedule for your hole</p>
            <div class="edit-modal-form">
              <label style="font-size:13px;font-weight:600;margin-bottom:8px;display:block">Schedule</label>
              <div class="schedule-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
                ${DAYS.map(day =>
                  SHIFTS.map(shift => {
                    const key = day + ' ' + shift;
                    const isChecked = captainEditingVolunteer.scheduled && captainEditingVolunteer.scheduled[key];
                    return '<label class="schedule-item" style="display:flex;align-items:center;gap:6px;font-size:12px"><input type="checkbox" id="cap_sched_' + day + '_' + shift + '" ' + (isChecked ? 'checked' : '') + '>' + day.slice(0,3) + ' ' + shift + '</label>';
                  }).join('')
                ).join('')}
              </div>
            </div>
            <div style="margin-top:20px;padding-top:15px;border-top:1px solid #eee">
              <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
                <input type="checkbox" id="sendScheduleEmail" style="flex-shrink:0">
                <span>Send updated schedule to volunteer via email</span>
              </label>
              ${captainEditingVolunteer.email ? '<p style="font-size:11px;color:#666;margin-top:5px;margin-left:24px">Email: ' + captainEditingVolunteer.email + '</p>' : '<p style="font-size:11px;color:#e65100;margin-top:5px;margin-left:24px">No email on file for this volunteer</p>'}
            </div>
            <div class="modal-buttons" style="margin-top:20px">
              <button class="modal-btn cancel" onclick="captainEditingVolunteer=null;render()">Cancel</button>
              <button class="modal-btn confirm" onclick="saveCaptainVolunteerEdit()">Save Schedule</button>
            </div>
          </div>
        </div>
      ` : '';

      // Roster modal for captain view
      const reportsModalHtml = showReportsModal ? `
        <div class="modal-overlay" onclick="showReportsModal=false;render()">
          <div class="modal" onclick="event.stopPropagation()" style="max-width:900px;width:95%;max-height:90vh;overflow-y:auto;text-align:left">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
              <h3 style="margin:0">Roster - Hole #${activeHole}</h3>
              <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                <button onclick="downloadPDF(${activeHole})" style="padding:8px 16px;background:#fff;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:13px">Download PDF</button>
                <button onclick="openEmailHoleModal(${activeHole})" style="padding:8px 16px;background:#1a472a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">Email to Hole</button>
                <button onclick="printReport()" style="padding:8px 16px;background:#fff;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:13px">Print</button>
                <button onclick="exportReportCSV()" style="padding:8px 16px;background:#fff;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:13px">Export CSV</button>
                <button onclick="showReportsModal=false;render()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#666">&times;</button>
              </div>
            </div>
            ${renderHoleRosterReport(activeHole, { hideViewAll: true, hideTitle: true })}
          </div>
        </div>
      ` : '';

      // Email to hole modal
      const emailHoleModalHtml = showEmailHoleModal ? `
        <div class="modal-overlay" onclick="closeEmailHoleModal()">
          <div class="modal" onclick="event.stopPropagation()" style="max-width:500px;text-align:left">
            <h3 style="margin:0 0 15px 0">Email Hole #${emailHoleNumber} Roster</h3>
            <p style="color:#666;font-size:13px;margin-bottom:15px">This will send the roster to all volunteers and captains on Hole #${emailHoleNumber} who have email addresses.</p>
            <div style="margin-bottom:15px">
              <label style="font-size:12px;color:#666;display:block;margin-bottom:6px;font-weight:600">Add a message (optional)</label>
              <textarea id="emailHoleMessage" placeholder="Enter any additional message you'd like to include..." style="width:100%;height:100px;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;resize:vertical"></textarea>
            </div>
            <div class="modal-buttons">
              <button class="modal-btn cancel" onclick="closeEmailHoleModal()">Cancel</button>
              <button id="sendEmailHoleBtn" class="modal-btn confirm" onclick="sendEmailToHole()">Send Email</button>
            </div>
          </div>
        </div>
      ` : '';

      return `
        <div>
          ${modalHtml}
          ${successModalHtml}
          ${helpModalHtml}
          ${pinSetupModalHtml}
          ${captainEditModalHtml}
          ${reportsModalHtml}
          ${emailHoleModalHtml}
          <div class="captain-header">
            <div class="captain-header-top">
              <div>
                ${isAdminUser ? `
                  <h1 style="display:flex;align-items:center;gap:10px">
                    <select onchange="adminSelectedHole=parseInt(this.value);render()" style="font-size:20px;font-weight:700;padding:4px 8px;border-radius:6px;border:none;background:rgba(255,255,255,0.9);color:#1a472a">
                      ${[...Array(getNumberOfHoles()).keys()].map(i => i + 1).map(h => `<option value="${h}" ${h === adminSelectedHole ? 'selected' : ''}>Hole #${h}</option>`).join('')}
                    </select>
                  </h1>
                  <p>Admin: ${captainAuth.name}</p>
                ` : isChairUser ? `
                  <h1 style="display:flex;align-items:center;gap:10px">
                    <select onchange="chairSelectedHole=parseInt(this.value);render()" style="font-size:20px;font-weight:700;padding:4px 8px;border-radius:6px;border:none;background:rgba(255,255,255,0.9);color:#1a472a">
                      ${captainAuth.assignedHoles.map(h => `<option value="${h}" ${h === chairSelectedHole ? 'selected' : ''}>Hole #${h}</option>`).join('')}
                    </select>
                  </h1>
                  <p>Chair: ${captainAuth.name}</p>

    // Archive functions
    function saveArchive() {
      const name = prompt('Enter a name for this archive (e.g., "2025 Tournament"):', appData.settings.tournamentName || 'Tournament ' + new Date().getFullYear());
      if (!name) return;

      const archive = {
        name: name,
        savedAt: new Date().toISOString(),
        volunteerCount: appData.volunteers.length,
        checkInCount: appData.checkIns.length,
        data: JSON.parse(JSON.stringify(appData))
      };

      serverArchives.push(archive);
      saveArchivesToServer();

      alert('Archive "' + name + '" saved successfully!');
      render();
    }

    function restoreArchive(index) {
      const archive = serverArchives[index];

      if (!archive) {
        alert('Archive not found');
        return;
      }

      const mode = prompt(
        `Restore "${archive.name}"?\n\n` +
        `Options:\n` +
        `1 = Full restore (replace everything)\n` +
        `2 = Volunteers only (keep current check-ins)\n` +
        `3 = Merge volunteers (add years worked to current)\n\n` +
        `Enter 1, 2, or 3:`,
        '1'
      );

      if (mode === '1') {
        appData = JSON.parse(JSON.stringify(archive.data));
        saveData();
        alert(`✓ Fully restored "${archive.name}"`);
      } else if (mode === '2') {
        const currentCheckIns = appData.checkIns;
        const currentSubmissions = appData.submissions;
        appData.volunteers = JSON.parse(JSON.stringify(archive.data.volunteers));
        appData.checkIns = currentCheckIns;
        appData.submissions = currentSubmissions;
        saveData();
        alert(`✓ Restored volunteers from "${archive.name}" (kept current check-ins)`);
      } else if (mode === '3') {
        // Merge: update yearsWorked for matching volunteers
        let updated = 0;
        archive.data.volunteers.forEach(archivedVol => {
          const match = appData.volunteers.find(v =>
            v.name.trim().toLowerCase() === archivedVol.name.trim().toLowerCase()
          );
          if (match && archivedVol.yearsWorked) {
            match.yearsWorked = archivedVol.yearsWorked;
            updated++;
          }
        });
        saveData();
        alert(`✓ Merged ${updated} volunteer(s) from "${archive.name}"`);
      } else {
        return;
      }

      render();
    }

    function deleteArchive(index) {
      const archive = serverArchives[index];

      if (!confirm('Delete archive "' + archive.name + '"? This cannot be undone.')) return;

      serverArchives.splice(index, 1);
      saveArchivesToServer();

      alert('Archive deleted');
      render();
    }

    function downloadArchiveCSV(index) {
      const archive = serverArchives[index];
      if (!archive) {
        alert('Archive not found');
        return;
      }

      const data = archive.data;
      const rows = [];

      // CSV header
      rows.push([
        'Name',
        'Type',
        'Hole',
        'Phone',
        'Years Worked',
        'Checked In',
        'Check-In Day',
        'Check-In Shift',
        'Check-In Time',
        'Checked In By'
      ].join(','));

      // Build a map of check-ins by volunteer ID
      const checkInMap = {};
      (data.checkIns || []).forEach(ci => {
        if (!checkInMap[ci.volunteerId]) {
          checkInMap[ci.volunteerId] = [];
        }
        checkInMap[ci.volunteerId].push(ci);
      });

      // Add a row for each volunteer
      (data.volunteers || []).forEach(vol => {
        const checkIns = checkInMap[vol.id] || [];

        if (checkIns.length === 0) {
          // Volunteer with no check-ins
          rows.push([
            escapeCSV(vol.name),
            escapeCSV(vol.type),
            vol.hole,
            escapeCSV(vol.phone || ''),
            vol.yearsWorked || 0,
            'No',
            '',
            '',
            '',
            ''
          ].join(','));
        } else {
          // One row per check-in
          checkIns.forEach(ci => {
            rows.push([
              escapeCSV(vol.name),
              escapeCSV(vol.type),
              vol.hole,
              escapeCSV(vol.phone || ''),
              vol.yearsWorked || 0,
              'Yes',
              escapeCSV(ci.day || ''),
              escapeCSV(ci.shift || ''),
              ci.timestamp ? new Date(ci.timestamp).toLocaleString() : '',
              escapeCSV(ci.checkedInBy || '')
            ].join(','));
          });
        }
      });

      // Create and download the file
      const csvContent = rows.join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${archive.name.replace(/[^a-z0-9]/gi, '_')}_export.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function escapeCSV(str) {
      if (str == null) return '';
      str = String(str);
      if (str.includes(',') || str.includes('"') || str.includes('\n')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }

    function exportArchiveFile() {
      const exportData = {
        type: 'volunteer_golf_backup',
        exportedAt: new Date().toISOString(),
        currentData: appData,
        archives: serverArchives
      };

      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `volunteer_golf_backup_${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importArchiveFile(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importData = JSON.parse(e.target.result);

          if (importData.type !== 'volunteer_golf_backup') {
            alert('Invalid backup file format');
            return;
          }

          const mode = prompt(
            'Found backup from ' + new Date(importData.exportedAt).toLocaleDateString() + '\n\n' +
            'Contains:\n' +
            '- ' + importData.currentData.volunteers.length + ' volunteers\n' +
            '- ' + importData.currentData.checkIns.length + ' check-ins\n' +
            '- ' + importData.archives.length + ' archived tournament(s)\n\n' +
            'Options:\n' +
            '1 = Restore everything (replace all data)\n' +
            '2 = Import archives only (add to existing)\n' +
            '3 = Cancel\n\n' +
            'Enter 1, 2, or 3:',
            '1'
          );

          if (mode === '1') {
            appData = JSON.parse(JSON.stringify(importData.currentData));
            saveData();
            serverArchives = importData.archives || [];
            saveArchivesToServer();
            alert('Full backup restored!');
          } else if (mode === '2') {
            serverArchives = serverArchives.concat(importData.archives || []);
            saveArchivesToServer();
            alert('Added ' + importData.archives.length + ' archive(s)');
          } else {
            return;
          }

          render();
        } catch (err) {
          alert('Error reading backup file: ' + err.message);
        }
      };
      reader.readAsText(file);
      input.value = '';
    }

    function toggleCheckIn(volunteerId) {
      // For admin users, use the selected hole; for chair users, use selected hole; for captains, use their assigned hole
      const isChairUser = captainAuth.isChair && captainAuth.assignedHoles && captainAuth.assignedHoles.length > 1;
      const activeHole = captainAuth.isAdmin ? adminSelectedHole : (isChairUser ? chairSelectedHole : captainAuth.hole);

      const existing = appData.checkIns.find(c =>
        c.volunteerId === volunteerId && c.day === selectedDay && c.shift === selectedShift && c.hole === activeHole
      );

      if (existing) {
        appData.checkIns = appData.checkIns.filter(c =>
          !(c.volunteerId === volunteerId && c.day === selectedDay && c.shift === selectedShift && c.hole === activeHole)
        );
      } else {
        const volunteer = appData.volunteers.find(v => v.id === volunteerId);
        appData.checkIns.push({
          volunteerId,
          volunteerName: volunteer ? volunteer.name : 'Unknown',
          hole: activeHole,
          day: selectedDay,
          shift: selectedShift,
          timestamp: new Date().toISOString(),
          checkedInBy: captainAuth.name,
          isAlternate: !(volunteer && volunteer.scheduled && volunteer.scheduled[`${selectedDay} ${selectedShift}`])
        });
      }
      
      saveData();
      render();
    }

    async function saveCaptainVolunteerEdit() {
      if (!captainEditingVolunteer) return;

      // Get new schedule from form
      const newSchedule = {};
      DAYS.forEach(day => {
        SHIFTS.forEach(shift => {
          const checkbox = document.getElementById('cap_sched_' + day + '_' + shift);
          if (checkbox && checkbox.checked) {
            newSchedule[day + ' ' + shift] = true;
          }
        });
      });

      // Find and update the volunteer
      const idx = appData.volunteers.findIndex(v => v.id === captainEditingVolunteer.id);
      if (idx === -1) {
        alert('Volunteer not found');
        return;
      }

      const oldSchedule = appData.volunteers[idx].scheduled || {};
      appData.volunteers[idx].scheduled = newSchedule;
      saveData();

      // Check if we should send email
      const sendEmail = document.getElementById('sendScheduleEmail');
      if (sendEmail && sendEmail.checked) {
        const vol = appData.volunteers[idx];
        if (vol.email) {
          try {
            await sendScheduleEmail(vol, newSchedule);
            alert('Schedule updated and email sent to ' + vol.email);
          } catch (err) {
            alert('Schedule updated but email failed: ' + err.message);
          }
        } else {
          alert('Schedule updated but no email on file for this volunteer.');
        }
      } else {
        alert('Schedule updated successfully!');
      }

      captainEditingVolunteer = null;
      render();
    }

    async function sendScheduleEmail(volunteer, schedule) {
      if (!volunteer.email) {
        throw new Error('No email address for this volunteer');
      }

      // Build schedule text
      const scheduledShifts = [];
      DAYS.forEach(day => {
        SHIFTS.forEach(shift => {
          if (schedule[day + ' ' + shift]) {
            const dateInfo = getRelativeTimeLabel(day, shift);
            scheduledShifts.push(day + ' ' + shift + ' (' + dateInfo.dateOnly + ')');
          }
        });
      });

      const subject = appData.settings.tournamentName + ' - Your Updated Schedule';
      const firstName = volunteer.name.split(',')[1]?.trim() || volunteer.name;

      // Build HTML schedule grid
      let scheduleRows = '';
      DAYS.forEach(day => {
        const dateInfo = getRelativeTimeLabel(day, 'AM');
        scheduleRows += '<tr><td colspan="2" style="padding:12px 8px 6px 8px;font-weight:600;color:#1a472a;font-size:14px;border-bottom:1px solid #eee">' + day + ' <span style="font-weight:normal;color:#666;font-size:12px">(' + dateInfo.dateOnly + ')</span></td></tr>';

        SHIFTS.forEach(shift => {
          const key = day + ' ' + shift;

          const icon = isScheduled
            ? '<span style="display:inline-block;width:20px;height:20px;background:#1a472a;border-radius:50%;color:white;text-align:center;line-height:20px;font-size:14px">✓</span>'
            : '<span style="display:inline-block;width:20px;height:20px;background:#f5f5f5;border:2px solid #ddd;border-radius:50%;"></span>';
          const labelStyle = isScheduled ? 'color:#1a472a;font-weight:600' : 'color:#999';
          const shiftLabel = shift === 'AM' ? 'Morning' : 'Afternoon';
          scheduleRows += '<td style="padding:8px;width:50%"><div style="display:flex;align-items:center;gap:10px">' + icon + ' <span style="' + labelStyle + '">' + shiftLabel + '</span></div></td>';
        });
        scheduleRows += '</tr>';
      });

      const message = `
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;padding:20px;background:#f5f5f5">
  <div style="max-width:500px;margin:0 auto;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
    <div style="background:#1a472a;color:white;padding:20px;text-align:center">
      <h1 style="margin:0;font-size:20px">${appData.settings.tournamentName}</h1>

    </div>
    <div style="padding:20px">
      <p style="margin:0 0 5px 0;font-size:16px">Hi ${firstName},</p>
      <p style="margin:0 0 20px 0;color:#666;font-size:14px">Your schedule has been updated.</p>

      <div style="background:#f8f9fa;border-radius:8px;padding:15px;margin-bottom:20px">
        <p style="margin:0;font-size:14px"><strong>Hole:</strong> <span style="color:#1a472a;font-weight:600">#${volunteer.hole}</span></p>
      </div>

      <h3 style="margin:0 0 15px 0;font-size:15px;color:#333">Your Schedule</h3>
      <table style="width:100%;border-collapse:collapse">
        ${scheduleRows}
      </table>

      <p style="margin:25px 0 0 0;padding-top:20px;border-top:1px solid #eee;color:#666;font-size:13px">If you have any questions, please contact your hole captain.</p>
      <p style="margin:15px 0 0 0;color:#333;font-size:13px">Thank you!</p>
    </div>
  </div>
</body>
</html>`;

      const response = await fetch('/api/email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Socket-ID': (socket && socket.id) || '' },
        body: JSON.stringify({
          to: [volunteer.email],
          subject: subject,
          message: message
        })
      });

      const result = await response.json();
      if (!result.success) {

    function handleFileUpload(input) {
      const file = input.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const text = e.target.result;
          const rows = text.split('\n').map(r => {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let char of r) {
              if (char === '"') inQuotes = !inQuotes;
              else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
              else current += char;
            }
            result.push(current.trim());
            return result;
          });
          
          const headers = rows[0];
          const nameCol = headers.findIndex(h => h.includes('NamePK') || h === 'Name');
          const typeCol = headers.findIndex(h => h.includes('Volunteer Type') || h === 'Type');
          const holeCol = headers.findIndex(h => h.includes('Assigned Location') || h === 'Hole');
          const phoneCol = headers.findIndex(h => h.includes('Phone_Cell') || h.includes('Cell'));
          const idCol = headers.findIndex(h => h.includes('Vol ID') || h === 'ID');
          const yearsCol = headers.findIndex(h => h.includes('Years Worked') || h === 'Years' || h.includes('Years_Worked'));
          
          const volunteers = rows.slice(1).filter(r => r.length > 1 && r[nameCol]).map((row, idx) => {
            const scheduled = {};
            DAYS.forEach(day => {
              SHIFTS.forEach(shift => {
                const colName = `Scheduled ${day} ${shift}`;
                const colIdx = headers.findIndex(h => h === colName);
                if (colIdx >= 0 && row[colIdx] === '1') {
                  scheduled[`${day} ${shift}`] = true;
                }
              });
            });
            
            return {
              id: idCol >= 0 && row[idCol] ? row[idCol] : String(idx + 1),
              name: row[nameCol] || '',
              type: typeCol >= 0 ? row[typeCol] : 'Volunteer',
              hole: holeCol >= 0 ? parseInt(row[holeCol]) || 0 : 0,
              phone: phoneCol >= 0 ? row[phoneCol] : '',
              yearsWorked: yearsCol >= 0 ? parseInt(row[yearsCol]) || 0 : 0,
              scheduled
            };
          });
          
          appData.volunteers = volunteers;
          saveData();
          alert(`Successfully imported ${volunteers.length} volunteers!`);
          render();
        } catch (err) {
          alert('Error importing file: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    function handleUpdateUpload(input) {
      const file = input.files[0];
      if (!file) return;

      if (appData.volunteers.length === 0) {
        alert('No volunteers loaded yet. Please import volunteers first.');
        input.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const text = e.target.result;
          const rows = text.split('\n').map(r => {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let char of r) {
              if (char === '"') inQuotes = !inQuotes;
              else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
              else current += char;
            }
            result.push(current.trim());
            return result;
          });

          const headers = rows[0];
          const nameCol = headers.findIndex(h => h.includes('NamePK') || h === 'Name' || h.includes('Name'));

          if (nameCol < 0) {
            alert('CSV must have a "Name" column');
            return;
          }

          // Map CSV headers to volunteer fields
          const fieldMappings = [
            { field: 'email', match: h => h.toLowerCase() === 'email' || h.toLowerCase().includes('email'), type: 'string' },
            { field: 'phone', match: h => h.toLowerCase() === 'phone' || h.toLowerCase().includes('phone'), type: 'string' },
            { field: 'type', match: h => h.toLowerCase() === 'type' || h.toLowerCase() === 'volunteer type', type: 'string' },
            { field: 'hole', match: h => h.toLowerCase() === 'hole' || h.toLowerCase().includes('hole'), type: 'int' },
            { field: 'yearsWorked', match: h => h.includes('Years Worked') || h === 'Years' || h.includes('Years_Worked') || h.toLowerCase() === 'years', type: 'int' },
            { field: 'customPin', match: h => h.toLowerCase().includes('pin') || h.toLowerCase().includes('custom pin'), type: 'string' }
          ];

          // Find which columns exist in the CSV
          const columnsToUpdate = [];
          fieldMappings.forEach(mapping => {
            const colIdx = headers.findIndex(mapping.match);
            if (colIdx >= 0 && colIdx !== nameCol) {
              columnsToUpdate.push({ ...mapping, colIdx });
            }
          });

          if (columnsToUpdate.length === 0) {
            alert('CSV must have at least one field to update (Email, Phone, Type, Hole, Years Worked, or Custom PIN)');
            return;
          }

          let updated = 0;
          let notFound = [];
          const fieldCounts = {};
          columnsToUpdate.forEach(c => fieldCounts[c.field] = 0);

          rows.slice(1).filter(r => r.length > 1 && r[nameCol]).forEach(row => {
            const name = row[nameCol].trim();

            // Find volunteer by name (case-insensitive, trimmed)
            const volIdx = appData.volunteers.findIndex(v =>
              v.name.trim().toLowerCase() === name.toLowerCase()
            );

            if (volIdx >= 0) {
              let wasUpdated = false;
              columnsToUpdate.forEach(col => {
                const value = row[col.colIdx];
                if (value !== undefined && value.toString().trim() !== '') {
                  if (col.type === 'int') {
                    appData.volunteers[volIdx][col.field] = parseInt(value) || 0;
                  } else {
                    appData.volunteers[volIdx][col.field] = value.trim();
                  }
                  fieldCounts[col.field]++;
                  wasUpdated = true;
                }
              });
              if (wasUpdated) updated++;
            } else if (name) {
              notFound.push(name);
            }
          });

          saveData();

          let msg = `Updated ${updated} volunteer(s).`;
          const fieldLabels = { email: 'emails', phone: 'phones', type: 'types', hole: 'holes', yearsWorked: 'years', customPin: 'PINs' };
          columnsToUpdate.forEach(col => {
            if (fieldCounts[col.field] > 0) {
              msg += `\n• ${fieldCounts[col.field]} ${fieldLabels[col.field] || col.field} updated`;
            }
          });
          if (notFound.length > 0) {
            msg += `\n\n${notFound.length} name(s) not found:\n${notFound.slice(0, 10).join('\n')}`;
            if (notFound.length > 10) msg += `\n...and ${notFound.length - 10} more`;
          }
          alert(msg);
          render();
        } catch (err) {
          alert('Error processing file: ' + err.message);
        }
      };
      reader.readAsText(file);
      input.value = '';
    }

    function exportCSV() {
      const headers = ['Name', 'Hole', 'Day', 'Shift', 'Check-In Time', 'Checked In By', 'Was Alternate'];
      const rows = appData.checkIns.map(c => [
        c.volunteerName,
        c.hole,
        c.day,
        c.shift,
        c.timestamp,
        c.checkedInBy,
        c.isAlternate ? 'Yes' : 'No'
      ]);
      const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `volunteer_checkins_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }

    // Modal functions
    function closeModal(event) {
      if (event.target.classList.contains('modal-overlay')) {
        showModal = null;
        render();
      }
    }

    // Submission functions
    function confirmSubmission() {
      if (!captainAuth) return;

      // For admin users, use the selected hole; for chair users, use selected hole; for captains, use their assigned hole
      const isChairUser = captainAuth.isChair && captainAuth.assignedHoles && captainAuth.assignedHoles.length > 1;
      const activeHole = captainAuth.isAdmin ? adminSelectedHole : (isChairUser ? chairSelectedHole : captainAuth.hole);

      // Get current checked-in IDs for tracking
      const checkedInIds = appData.checkIns
        .filter(c => c.day === selectedDay && c.shift === selectedShift && c.hole === activeHole)
        .map(c => c.volunteerId);

      // Remove existing submission for this hole/day/shift
      appData.submissions = appData.submissions.filter(s =>
        !(s.hole === activeHole && s.day === selectedDay && s.shift === selectedShift)
      );

      // Add new submission with notes and checked-in IDs
      appData.submissions.push({
        hole: activeHole,
        day: selectedDay,
        shift: selectedShift,
        timestamp: new Date().toISOString(),
        captainName: captainAuth.name,
        notes: captainNotes || '',
        checkedInIds: checkedInIds
      });

      saveData();
      showModal = null;

      // Show success modal with random message
      const randomMsg = SUCCESS_MESSAGES[Math.floor(Math.random() * SUCCESS_MESSAGES.length)];
      successMessage = randomMsg;
      showSuccessModal = true;
      captainNotes = ''; // Clear notes after submission

      render();
    }

    // Email function
    async function sendEmail(to, subject, message) {
      try {
        // Ensure 'to' is an array of strings
        var recipients = [];
        if (Array.isArray(to)) {
          for (var i = 0; i < to.length; i++) {
            var email = String(to[i] || '').trim();
            if (email.length > 0) {
              recipients.push(email);
            }
          }
        } else {
          var singleEmail = String(to || '').trim();
          if (singleEmail.length > 0) {
            recipients.push(singleEmail);
          }
        }

        if (recipients.length === 0) {
          throw new Error('No valid email recipients');
        }

        var payload = {
          to: recipients,
          subject: String(subject || ''),
          message: String(message || '')
        };

        var response = await fetch('/api/email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Socket-ID': (socket && socket.id) || '' },
          body: JSON.stringify(payload)
        });

        var result = await response.json();

        if (!result.success) {
          throw new Error(result.error || 'Email failed');
        }

        return result;
      } catch (err) {
        var errMsg = (err && err.message) ? err.message : String(err);
        if (errMsg.indexOf('Failed to fetch') >= 0) {
          throw new Error('Could not connect to server. Please check your internet connection.');
        }
        throw new Error(errMsg);
      }
    }

    function updatePoweredByFooter() {
      var footer = document.getElementById('powered-by-footer');
      if (!footer) return;
      var show = appData.settings.showPoweredBy !== false;
      var text = appData.settings.poweredByText || 'Volunteer Golf';
      var url = appData.settings.poweredByUrl;
      if (show) {
        footer.style.display = 'block';
        document.body.classList.add('has-powered-by');
        if (url) {
          footer.innerHTML = 'Powered by <a href="' + url + '" target="_blank">' + text + '</a>';
        } else {
          footer.innerHTML = 'Powered by ' + text;
        }
      } else {
        footer.style.display = 'none';
        document.body.classList.remove('has-powered-by');
      }
    }

    function attachEventListeners() {
      const adminForm = document.getElementById('adminLoginForm');
      if (adminForm) {
        adminForm.onsubmit = function(e) {
          e.preventDefault();
          const password = document.getElementById('adminPassword').value;
          // Check full admin password first
          if (password.toLowerCase() === appData.settings.adminPassword.toLowerCase()) {
            adminAuth = 'full';
            currentView = 'admin';
            render();
          // Then check view-only admin password
          } else if (appData.settings.viewAdminPassword && password.toLowerCase() === appData.settings.viewAdminPassword.toLowerCase()) {
            adminAuth = 'viewOnly';
            adminTab = 'overview'; // Start on overview tab
            currentView = 'admin';
            render();
          } else {
            const err = document.getElementById('adminError');
            err.textContent = 'Incorrect password';
            err.classList.remove('hidden');
            document.getElementById('adminPassword').classList.add('error');
            setTimeout(() => { err.classList.add('hidden'); document.getElementById('adminPassword').classList.remove('error'); }, 2000);
          }
        };
      }
      
      const captainForm = document.getElementById('captainLoginForm');
      if (captainForm) {
        const phoneInput = document.getElementById('captainPhone');
        const submitBtn = document.getElementById('captainSubmit');
        
        phoneInput.oninput = function() {
          try {
            var val = String(this.value || '');
            var digits = '';
            for (var i = 0; i < val.length && digits.length < 4; i++) {
              if (val[i] >= '0' && val[i] <= '9') {
                digits += val[i];
              }
            }
            this.value = digits;
            submitBtn.disabled = digits.length < 4;
          } catch (ex) {
            // ignore
          }
        };
        
        captainForm.onsubmit = function(e) {
          e.preventDefault();
          try {
            var pin4 = String(phoneInput.value || '');
            var captains = appData.volunteers.filter(function(v) {
              return v.type === 'Captain' || v.type === 'Asst. Chairman' || v.type === 'Chairman' || v.type === 'Admin';
            });
            var captain = null;
            var usedPhoneLogin = false;

            // First try to match custom PIN
            for (var i = 0; i < captains.length; i++) {
              if (captains[i].customPin && captains[i].customPin === pin4) {
                captain = captains[i];
                break;
              }
            }

            // If no custom PIN match, try phone number (first-time login)
            if (!captain) {
              for (var i = 0; i < captains.length; i++) {
                if (formatPhone(captains[i].phone) === pin4 && !captains[i].customPin) {
                  captain = captains[i];
                  usedPhoneLogin = true;
                  break;
                }
              }
            }

            if (captain) {
              const isChair = captain.type === 'Chairman' || captain.type === 'Asst. Chairman';
              captainAuth = {
                name: captain.name,
                hole: captain.hole,
                phone4: pin4,
                isAdmin: captain.type === 'Admin',
                isChair: isChair,
                assignedHoles: isChair && captain.assignedHoles ? captain.assignedHoles : [captain.hole],
                odId: captain.id
              };
              currentView = 'captain';

              // If first-time login (used phone, no custom PIN), show PIN setup modal
              if (usedPhoneLogin && !captain.customPin) {
                showPinSetupModal = true;
              }

              render();
            } else {
              var err = document.getElementById('captainError');
              err.textContent = 'PIN not found. Use the last 4 digits of your phone for first login, or your custom PIN.';
              err.classList.remove('hidden');
              phoneInput.classList.add('error');
              setTimeout(function() { err.classList.add('hidden'); phoneInput.classList.remove('error'); }, 3000);
            }
          } catch (ex) {
            alert('Login error: ' + ex.message);
          }
        };
      }

      // Handle volunteer login form
      const volunteerForm = document.getElementById('volunteerLoginForm');
      if (volunteerForm) {
        const phoneInput = document.getElementById('volunteerPhone');
        const submitBtn = document.getElementById('volunteerSubmit');

        phoneInput.oninput = function() {
          try {
            var val = String(this.value || '');
            var digits = '';
            for (var i = 0; i < val.length && digits.length < 4; i++) {
              if (val[i] >= '0' && val[i] <= '9') {
                digits += val[i];
              }
            }
            this.value = digits;
            submitBtn.disabled = digits.length < 4;
          } catch (ex) {
            // ignore
          }
        };

        volunteerForm.onsubmit = function(e) {
          e.preventDefault();
          try {
            var phone4 = String(phoneInput.value || '');
            var volunteer = null;

            // Find volunteer by last 4 of phone
            for (var i = 0; i < appData.volunteers.length; i++) {
              if (formatPhone(appData.volunteers[i].phone) === phone4) {
                volunteer = appData.volunteers[i];
                break;
              }
            }

            if (volunteer) {
              volunteerAuth = volunteer;
              currentView = 'volunteer';
              render();
            } else {
              var err = document.getElementById('volunteerError');
              err.textContent = 'Phone number not found. Please use the last 4 digits of your registered phone.';
              err.classList.remove('hidden');
              phoneInput.classList.add('error');
              setTimeout(function() { err.classList.add('hidden'); phoneInput.classList.remove('error'); }, 3000);
            }
          } catch (ex) {
            alert('Login error: ' + ex.message);
          }
        };
      }

      // Handle PIN setup form
      const pinSetupForm = document.getElementById('pinSetupForm');
      if (pinSetupForm) {
        pinSetupForm.onsubmit = function(e) {
          e.preventDefault();
          const newPin = document.getElementById('newPinInput').value;
          const confirmPin = document.getElementById('confirmPinInput').value;

          if (newPin.length !== 4 || !/^\d{4}$/.test(newPin)) {
            alert('PIN must be exactly 4 digits');
            return;
          }

          if (isWeakPin(newPin)) {
            alert("That PIN is too easy to guess. Please pick something more unique - avoid patterns like 1234 or repeated digits.");
            return;
          }

          if (newPin !== confirmPin) {
            alert('PINs do not match');
            return;
          }

          // Save custom PIN
          const captain = appData.volunteers.find(v => v.name === captainAuth.name);
          if (captain) {
            captain.customPin = newPin;
            saveData();
            showPinSetupModal = false;
            alert('Your PIN has been set! Use ' + newPin + ' to log in next time.');
            render();
          }
        };
      }
    }

    // Initial render - show loading, then fetch data from server
    render();

    // WebSocket for real-time updates
    var isConnected = false;
    
    function initWebSocket() {
      if (socket) return;
      
      socket = io();
      
      socket.on('connect', function() {
        console.log('WebSocket connected');
        isConnected = true;
        // Join appropriate room based on demo mode
        var demoMode = document.cookie.includes('demoMode=true');
        socket.emit('joinRoom', demoMode ? 'demo' : 'live');
        updateConnectionStatus(true);
      });
      
      socket.on('disconnect', function() {
        console.log('WebSocket disconnected');
        isConnected = false;
        updateConnectionStatus(false);
      });
      
      socket.on('dataUpdated', function(event) {
        console.log('Data updated:', event.type);
        if (event.type === 'fullUpdate') {
          // Full data update - reload
          appData = event.data;
          if (!appData.submissions) appData.submissions = [];
          if (!appData.settings) appData.settings = defaultData.settings;
          render();
          showToast('Data updated by another user');
        } else if (event.type === 'checkIn') {
          // Single check-in added
          if (!appData.checkIns.find(c => c.volunteerId === event.data.volunteerId && c.day === event.data.day && c.shift === event.data.shift)) {
            appData.checkIns.push(event.data);
            render();
            showToast(event.data.volunteerName + ' checked in');
          }
        } else if (event.type === 'checkOut') {
          // Check-in removed
          appData.checkIns = appData.checkIns.filter(c => 
            !(c.volunteerId === event.data.volunteerId && c.day === event.data.day && c.shift === event.data.shift)
          );
          render();
          showToast('Check-in removed');
        }
      });
      
      socket.on('demoReset', function() {
        if (document.cookie.includes('demoMode=true')) {
          loadDataFromServer();
          showToast('Demo data has been reset');
        }
      });
    }
    
    function updateConnectionStatus(connected) {
      var indicator = document.getElementById('connection-status');
      if (indicator) {
        indicator.className = 'connection-status ' + (connected ? 'connected' : 'disconnected');
        indicator.title = connected ? 'Real-time updates active' : 'Reconnecting...';
      }
    }
    
    function showToast(message) {
      var existing = document.querySelector('.realtime-toast');
      if (existing) existing.remove();
      
      var toast = document.createElement('div');
      toast.className = 'realtime-toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(function() { toast.classList.add('show'); }, 10);
      setTimeout(function() { 
        toast.classList.remove('show');
        setTimeout(function() { toast.remove(); }, 300);
      }, 3000);
    }

    loadDataFromServer();
    initWebSocket();
  </script>
