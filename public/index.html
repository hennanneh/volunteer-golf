    // Email function
    async function sendEmail(to, subject, message) {
      try {
        // Ensure 'to' is an array of strings
        var recipients = [];
        if (Array.isArray(to)) {
          for (var i = 0; i < to.length; i++) {
            var email = String(to[i] || '').trim();
            if (email.length > 0) {
              recipients.push(email);
            }
          }
        } else {
          var singleEmail = String(to || '').trim();
          if (singleEmail.length > 0) {
            recipients.push(singleEmail);
          }
        }

        if (recipients.length === 0) {
          throw new Error('No valid email recipients');
        }

        var payload = {
          to: recipients,
          subject: String(subject || ''),
          message: String(message || '')
        };

        var response = await fetch('/api/email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Socket-ID': (socket && socket.id) || '' },
          body: JSON.stringify(payload)
        });

        var result = await response.json();

        if (!result.success) {
          throw new Error(result.error || 'Email failed');
        }

        return result;
      } catch (err) {
        var errMsg = (err && err.message) ? err.message : String(err);
        if (errMsg.indexOf('Failed to fetch') >= 0) {
          throw new Error('Could not connect to server. Please check your internet connection.');
        }
        throw new Error(errMsg);
      }
    }

          if (result && result.success && result.user) {
            const volunteer = appData.volunteers.find(v => String(v.id) === String(result.user.id));
            if (volunteer) {
              volunteerAuth = volunteer;
              currentView = 'volunteer';
              logActivity('login', '', 'Logged into Volunteer portal');
              if (result.usingDefaultPassword) showVolunteerPasswordChangeModal = true;
              saveAuthState();
              render();
              return;
            }
          }

          // Show error
          const err = document.getElementById('volunteerError');
          err.textContent = (result && result.error) ? result.error : 'Invalid email or password';
          err.classList.remove('hidden');
          document.getElementById('volunteerEmail').classList.add('error');
          document.getElementById('volunteerPassword').classList.add('error');
          setTimeout(() => { err.classList.add('hidden'); document.getElementById('volunteerEmail').classList.remove('error'); document.getElementById('volunteerPassword').classList.remove('error'); }, 3000);
        };
      }

      // Handle captain password change form
      const captainPasswordChangeForm = document.getElementById('captainPasswordChangeForm');
      if (captainPasswordChangeForm) {
        captainPasswordChangeForm.onsubmit = async function(e) {
          e.preventDefault();
          if (!captainAuth) return;

          const currentPassword = document.getElementById('currentCaptainPassword').value;
          const newPassword = document.getElementById('newCaptainPassword').value;
          const confirmPassword = document.getElementById('confirmCaptainPassword').value;

          if (newPassword.length < 4) { alert('New password must be at least 4 characters'); return; }
          if (newPassword !== confirmPassword) { alert('New passwords do not match'); return; }

          const result = await apiSetPassword({
            volunteerId: captainAuth.id,
            field: 'volunteer',
            currentPassword: currentPassword,
            newPassword: newPassword
          });
          if (!result.success) {
            alert(result.error || 'Failed to change password');
            return;
          }
          logActivity('password-change', '', 'Changed captain password');
          showPasswordChangeModal = false;
          showToast('Password changed successfully');
          render();
        };
      }

      // Handle volunteer password change form
      const volunteerPasswordChangeForm = document.getElementById('volunteerPasswordChangeForm');
      if (volunteerPasswordChangeForm) {
        volunteerPasswordChangeForm.onsubmit = async function(e) {
          e.preventDefault();
          if (!volunteerAuth) return;

          const currentPassword = document.getElementById('currentVolPassword').value;
          const newPassword = document.getElementById('newVolPassword').value;
          const confirmPassword = document.getElementById('confirmVolPassword').value;

          if (newPassword.length < 4) { alert('New password must be at least 4 characters'); return; }
          if (newPassword !== confirmPassword) { alert('New passwords do not match'); return; }

          const result = await apiSetPassword({
            volunteerId: volunteerAuth.id,
            field: 'volunteer',
            currentPassword: currentPassword,
            newPassword: newPassword
          });
          if (!result.success) {
            alert(result.error || 'Failed to change password');
            return;
          }
          logActivity('password-change', '', 'Changed volunteer password');
          showVolunteerPasswordChangeModal = false;
          showToast('Password changed successfully');
          render();
        };
      }

    }

    // Initial render - show loading, then fetch data from server
    render();

    // WebSocket for real-time updates
    var isConnected = false;
    
    function initWebSocket() {
      if (socket) return;
      
      socket = io();
      
      socket.on('connect', function() {
        console.log('WebSocket connected');
        isConnected = true;
        // Join appropriate room based on demo mode
        var demoMode = document.cookie.includes('demoMode=true');
        socket.emit('joinRoom', demoMode ? 'demo' : 'live');
        updateConnectionStatus(true);
      });
      
      socket.on('disconnect', function() {
        console.log('WebSocket disconnected');
        isConnected = false;
        updateConnectionStatus(false);
      });
      
      socket.on('dataUpdated', function(event) {
        console.log('Data updated:', event.type);
        // Skip re-rendering in two cases so background broadcasts don't wipe
        // out work the user is currently doing:
        //   1. The user is on a login/landing screen (no point re-rendering it
        //      and it would destroy in-progress form input).
        //   2. A text input/textarea/select currently has focus — the user is
        //      mid-edit somewhere (volunteer form, settings, etc.) and an
        //      innerHTML replacement would lose their typing and focus.
        // appData is still updated either way; the next user action will
        // pick up the fresh state.
        function skipRender() {
          if (currentView === 'landing' || currentView === 'adminLogin' || currentView === 'captainLogin' || currentView === 'volunteerLogin') return true;
          var ae = document.activeElement;
          if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT')) return true;
          return false;
        }

        if (event.type === 'fullUpdate') {
          // Full data update - reload
          appData = event.data;
          if (!appData.submissions) appData.submissions = [];
          if (!appData.settings) appData.settings = defaultData.settings;
          if (!skipRender()) render();
        } else if (event.type === 'checkIn') {
          // Single check-in added (match on hole too — same volunteer can be
          // checked in on multiple holes for the same day/shift in edge cases)
          var d = event.data;
          if (!appData.checkIns.find(c => c.volunteerId === d.volunteerId && c.day === d.day && c.shift === d.shift && c.hole === d.hole)) {
            appData.checkIns.push(d);
            if (!skipRender()) render();
          }
        } else if (event.type === 'checkOut') {
          // Check-in removed (match on hole too)
          var rd = event.data;
          appData.checkIns = appData.checkIns.filter(c =>
            !(c.volunteerId === rd.volunteerId && c.day === rd.day && c.shift === rd.shift && (rd.hole === undefined || c.hole === rd.hole))
          );
          if (!skipRender()) render();
        }
      });
      
      socket.on('demoReset', function() {
        if (document.cookie.includes('demoMode=true')) {
          loadDataFromServer();
          showToast('Demo data has been reset');
        }
      });
    }
    
    function updateConnectionStatus(connected) {
      var indicator = document.getElementById('connection-status');
      if (indicator) {
        indicator.className = 'connection-status ' + (connected ? 'connected' : 'disconnected');
        indicator.title = connected ? 'Real-time updates active' : 'Reconnecting...';
      }
    }
    
    // Forgot-password: ask for email, POST /api/request-password-reset, show confirmation.
    function openForgotPassword(portal) {
      var portalLabel = portal === 'admin' ? 'Admin' : portal === 'captain' ? 'Captain' : 'Volunteer';
      var prefillId = portal === 'admin' ? 'adminEmail' : portal === 'captain' ? 'captainEmail' : 'volunteerEmail';
      var prefill = '';
      var el = document.getElementById(prefillId);
      if (el && el.value) prefill = el.value.trim();
      var overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px';
      overlay.innerHTML = '<div style="background:#fff;border-radius:12px;max-width:400px;width:100%;padding:24px"><h3 style="margin:0 0 8px 0;color:#1a472a">Reset ' + portalLabel + ' Password</h3><p style="margin:0 0 16px 0;color:#555;font-size:14px">Enter your email address. If we have an account on file, we\'ll send a link to reset your password.</p><input type="email" id="forgotEmail" class="input-field" placeholder="Email" value="' + prefill.replace(/"/g, '&quot;') + '" style="margin-bottom:12px"><div id="forgotMsg" style="font-size:13px;margin-bottom:12px;min-height:18px"></div><div style="display:flex;gap:8px;justify-content:flex-end"><button type="button" id="forgotCancel" class="submit-btn" style="background:#ccc;color:#333">Cancel</button><button type="button" id="forgotSend" class="submit-btn">Send Reset Link</button></div></div>';
      document.body.appendChild(overlay);
      var close = function() { overlay.remove(); };
      overlay.querySelector('#forgotCancel').onclick = close;
      overlay.onclick = function(e) { if (e.target === overlay) close(); };
      overlay.querySelector('#forgotSend').onclick = async function() {
        var email = overlay.querySelector('#forgotEmail').value.trim().toLowerCase();
        var msg = overlay.querySelector('#forgotMsg');
        if (!email) { msg.style.color = '#c00'; msg.textContent = 'Email required'; return; }
        msg.style.color = '#555'; msg.textContent = 'Sending...';
        try {
          var resp = await fetch('/api/request-password-reset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, portal: portal })
          });
          var result = await resp.json();
          if (resp.status === 429) {
            msg.style.color = '#c00'; msg.textContent = (result && result.error) || 'Too many requests, try again later';
            return;
          }
          msg.style.color = '#1a472a';
          msg.innerHTML = 'If an account exists for that email, a reset link has been sent. Check your inbox (and spam folder). The link expires in 30 minutes.';
          overlay.querySelector('#forgotSend').style.display = 'none';
          overlay.querySelector('#forgotCancel').textContent = 'Close';
        } catch (e) {
          msg.style.color = '#c00'; msg.textContent = 'Network error — please try again';
        }
      };
      setTimeout(function() { overlay.querySelector('#forgotEmail').focus(); }, 50);
    }

    // If the URL contains ?reset=TOKEN, show the reset form.
    function maybeShowResetForm() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('reset');
      if (!token) return;
      var overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px';
      overlay.innerHTML = '<div style="background:#fff;border-radius:12px;max-width:400px;width:100%;padding:24px"><h3 style="margin:0 0 8px 0;color:#1a472a">Set a New Password</h3><p style="margin:0 0 16px 0;color:#555;font-size:14px">Enter a new password for your account.</p><input type="password" id="resetNew" class="input-field" placeholder="New password" autocomplete="new-password" style="margin-bottom:10px"><input type="password" id="resetConfirm" class="input-field" placeholder="Confirm new password" autocomplete="new-password" style="margin-bottom:12px"><div id="resetMsg" style="font-size:13px;margin-bottom:12px;min-height:18px"></div><button type="button" id="resetSubmit" class="submit-btn" style="width:100%">Set Password</button></div>';
      document.body.appendChild(overlay);
      var clearUrl = function() {
        var url = new URL(window.location.href);
        url.searchParams.delete('reset');
        window.history.replaceState({}, '', url.toString());
      };
      overlay.querySelector('#resetSubmit').onclick = async function() {
        var pw = overlay.querySelector('#resetNew').value;
        var cpw = overlay.querySelector('#resetConfirm').value;
        var msg = overlay.querySelector('#resetMsg');
        if (pw.length < 4) { msg.style.color = '#c00'; msg.textContent = 'Password must be at least 4 characters'; return; }
        if (pw !== cpw) { msg.style.color = '#c00'; msg.textContent = 'Passwords do not match'; return; }
        msg.style.color = '#555'; msg.textContent = 'Saving...';
        try {
          var resp = await fetch('/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, newPassword: pw })
          });
          var result = await resp.json();
          if (result && result.success) {
            msg.style.color = '#1a472a';
            msg.textContent = 'Password updated. You can now log in.';
            clearUrl();
            setTimeout(function() { overlay.remove(); }, 1500);
          } else {
            msg.style.color = '#c00';
            msg.textContent = (result && result.error) || 'Failed to reset password';
          }
        } catch (e) {
          msg.style.color = '#c00'; msg.textContent = 'Network error — please try again';
        }
      };
      setTimeout(function() { overlay.querySelector('#resetNew').focus(); }, 50);
    }
    window.addEventListener('DOMContentLoaded', maybeShowResetForm);

    function togglePassword(inputId) {
      var input = document.getElementById(inputId);
      var btn = input.nextElementSibling;
      var eyeOpen = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      var eyeClosed = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = eyeClosed;
      } else {
        input.type = 'password';
        btn.innerHTML = eyeOpen;
      }
    }

    function showToast(message) {
      var existing = document.querySelector('.realtime-toast');
      if (existing) existing.remove();
      
      var toast = document.createElement('div');
      toast.className = 'realtime-toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(function() { toast.classList.add('show'); }, 10);
      setTimeout(function() { 
        toast.classList.remove('show');
        setTimeout(function() { toast.remove(); }, 300);
      }, 3000);
    }

    loadDataFromServer();
    initWebSocket();
    initPullToRefresh();

    // Register service worker for PWA + wire up the update banner.
    //
    // Flow when a new version is deployed:
    //   1. User loads the page → registration check
    //   2. SW finds a new sw.js, installs it → 'updatefound' fires
    //   3. Once installed (and there's already an active controller),
    //      the green "Software updated — tap here to refresh" banner
    //      appears at the top of the screen.
    //   4. User clicks the banner → applyAppUpdate() posts 'skipWaiting'
    //      to the new SW, which activates and triggers controllerchange.
    //   5. The controllerchange handler reloads the page → user is on
    //      the new version with no manual hard-refresh needed.
    var pendingWorker = null;
    var hasReloaded = false;

    function showAppUpdateBanner() {
      const banner = document.getElementById('update-banner');
      if (banner) {
        banner.classList.add('visible');
        document.body.classList.add('update-available');
      }
    }

    // Banner click handler. Tells the waiting SW to take over; the
    // controllerchange listener below then reloads the page.
    function applyAppUpdate() {
      if (pendingWorker) {
        pendingWorker.postMessage('skipWaiting');
      } else if (navigator.serviceWorker && navigator.serviceWorker.controller) {
        // Fallback: no waiting worker reference, just hard-reload
        window.location.reload();
      }
    }

    if ('serviceWorker' in navigator) {
      // When the controlling SW changes (new version took over), reload
      // exactly once so the page is running fresh HTML/JS.
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (hasReloaded) return;
        hasReloaded = true;
        window.location.reload();
      });

      navigator.serviceWorker.register('/sw.js')
        .then((registration) => {
          console.log('ServiceWorker registered:', registration.scope);

          // If a worker is already waiting at registration time (the user
          // missed the updatefound event because they loaded the page
          // mid-install), surface the banner immediately.
          if (registration.waiting && navigator.serviceWorker.controller) {
            pendingWorker = registration.waiting;
            showAppUpdateBanner();
          }

          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // A new version finished installing while the old one is
                // still controlling — prompt the user to upgrade.
                pendingWorker = newWorker;
                showAppUpdateBanner();
              }
            });
          });

          // Periodically check for updates so users with the app open all
          // day get the banner without having to reload first. Every 30 min.
          setInterval(() => { registration.update().catch(() => {}); }, 30 * 60 * 1000);
        })
        .catch((error) => {
          console.log('ServiceWorker registration failed:', error);
        });
    }
  </script>
