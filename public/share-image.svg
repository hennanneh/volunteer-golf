<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background - Golf green gradient -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F4FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#228B22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a472a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flagGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B22222;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="630" fill="url(#skyGradient)"/>

  <!-- Grass/Green -->
  <ellipse cx="600" cy="580" rx="700" ry="200" fill="url(#grassGradient)"/>

  <!-- Golf hole -->
  <ellipse cx="520" cy="420" rx="25" ry="8" fill="#1a1a1a"/>
  <ellipse cx="520" cy="418" rx="20" ry="6" fill="#333"/>

  <!-- Flag pole -->
  <rect x="518" y="150" width="4" height="270" fill="#E8E8E8"/>
  <rect x="517" y="150" width="6" height="270" fill="#D3D3D3" rx="2"/>

  <!-- Flag (waving triangle) -->
  <path d="M 522 150
           Q 620 170, 650 190
           Q 620 210, 522 230
           Z"
        fill="url(#flagGradient)"/>

  <!-- Flag number circle -->
  <circle cx="575" cy="190" r="25" fill="white"/>
  <text x="575" y="200" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a472a" text-anchor="middle">18</text>

  <!-- Text: Colonial Volunteers -->
  <text x="600" y="520" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" stroke="#1a472a" stroke-width="1">Colonial Volunteers</text>
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle" opacity="0.9">colonialvolunteers.golf</text>
</svg>
